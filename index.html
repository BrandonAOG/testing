<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NEON//GRID — Retro Arcade Hub</title>
<style>
/* ============================================================
   NEON//GRID — Core Arcade Hub
   Retro-synthwave dashboard. Zero external assets.
   ============================================================ */
:root{
  --bg-deep:#0b0518;
  --bg-panel:#140a2b;
  --bg-card:#1a0f36;
  --neon-magenta:#ff2ea6;
  --neon-cyan:#22e6ff;
  --neon-violet:#8b5cf6;
  --neon-amber:#ffc857;
  --ink:#e8e4ff;
  --ink-dim:#9a8fc7;
  --line:#2c1b5e;
  --font-ui:ui-monospace,'Cascadia Mono','JetBrains Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg-deep);
  color:var(--ink);
  font-family:var(--font-ui);
  overflow-x:hidden;
  position:relative;
  overscroll-behavior-y:none;
}

/* ---------- Ambient synthwave backdrop ---------- */
.horizon{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, #2a1259 0%, transparent 60%),
    radial-gradient(ellipse 80% 40% at 50% 110%, #3d0f4d 0%, transparent 70%),
    var(--bg-deep);
}
.sun{
  position:fixed;left:50%;top:14%;width:340px;height:340px;
  transform:translateX(-50%);z-index:0;pointer-events:none;border-radius:50%;
  background:linear-gradient(180deg,var(--neon-amber) 0%,var(--neon-magenta) 55%,#7a0e5c 100%);
  filter:blur(2px) saturate(1.2);
  opacity:.28;
  -webkit-mask:repeating-linear-gradient(180deg,#000 0 14px,transparent 14px 22px);
          mask:repeating-linear-gradient(180deg,#000 0 14px,transparent 14px 22px);
  animation:sunPulse 6s ease-in-out infinite;
}
@keyframes sunPulse{0%,100%{opacity:.22}50%{opacity:.34}}
.gridfloor{
  position:fixed;left:-50%;right:-50%;bottom:-2%;height:46vh;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(90deg,rgba(255,46,166,.35) 0 2px,transparent 2px 90px),
    repeating-linear-gradient(0deg, rgba(34,230,255,.30) 0 2px,transparent 2px 64px);
  transform:perspective(420px) rotateX(62deg);
  transform-origin:50% 100%;
  animation:gridScroll 3.2s linear infinite;
  opacity:.5;
  -webkit-mask:linear-gradient(180deg,transparent,#000 35%);
          mask:linear-gradient(180deg,transparent,#000 35%);
}
@keyframes gridScroll{from{background-position:0 0,0 0}to{background-position:0 0,0 64px}}
.scanlines{
  position:fixed;inset:0;z-index:50;pointer-events:none;mix-blend-mode:overlay;opacity:.5;
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 1px,transparent 1px 3px);
}
@media (prefers-reduced-motion:reduce){
  .gridfloor,.sun{animation:none}
  *{transition:none!important}
}

/* ---------- Shell ---------- */
.shell{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:28px 22px 80px}

header.masthead{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:26px}
.logo{font-size:clamp(28px,5vw,46px);font-weight:800;letter-spacing:.08em;line-height:1}
.logo .a{color:var(--neon-cyan);text-shadow:0 0 8px var(--neon-cyan),0 0 28px rgba(34,230,255,.5)}
.logo .b{color:var(--neon-magenta);text-shadow:0 0 8px var(--neon-magenta),0 0 28px rgba(255,46,166,.5)}
.tagline{color:var(--ink-dim);font-size:12px;letter-spacing:.28em;text-transform:uppercase;margin-top:8px}
.credits{
  text-align:right;font-size:12px;color:var(--ink-dim);line-height:1.7
}
.credits b{color:var(--neon-amber);font-size:16px;text-shadow:0 0 10px rgba(255,200,87,.6)}

/* ---------- Tabs ---------- */
nav.tabs{display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:22px}
.tab{
  appearance:none;border:1px solid var(--line);background:var(--bg-panel);color:var(--ink-dim);
  font-family:inherit;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
  padding:10px 18px;cursor:pointer;border-radius:4px;position:relative;transition:.18s;
}
.tab:hover{color:var(--ink);border-color:var(--neon-violet)}
.tab:focus-visible{outline:2px solid var(--neon-cyan);outline-offset:2px}
.tab[aria-selected="true"]{
  color:#fff;border-color:var(--neon-magenta);
  box-shadow:0 0 12px rgba(255,46,166,.45),inset 0 0 12px rgba(255,46,166,.15);
  text-shadow:0 0 6px var(--neon-magenta);
}
.tab .count{color:var(--neon-cyan);margin-left:6px}

/* ---------- Game grid ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.card{
  background:linear-gradient(160deg,var(--bg-card),#120a26);
  border:1px solid var(--line);border-radius:8px;padding:16px;
  display:flex;flex-direction:column;gap:10px;min-height:150px;
  transition:transform .18s,box-shadow .18s,border-color .18s;position:relative;overflow:hidden;
}
.card::before{ /* corner glint */
  content:"";position:absolute;top:-40%;left:-60%;width:60%;height:180%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.06),transparent);
  transform:rotate(8deg);transition:left .5s;
}
.card:hover::before{left:120%}
.card.playable:hover{
  transform:translateY(-4px);border-color:var(--neon-cyan);
  box-shadow:0 8px 30px rgba(34,230,255,.22),0 0 0 1px rgba(34,230,255,.35);
}
.card .genre{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--neon-violet)}
.card h3{font-size:15px;letter-spacing:.06em;color:var(--ink)}
.card .hs{font-size:11px;color:var(--ink-dim)}
.card .hs b{color:var(--neon-amber)}
.card .go{
  margin-top:auto;appearance:none;border:1px solid var(--neon-cyan);background:transparent;
  color:var(--neon-cyan);font-family:inherit;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  padding:8px 0;border-radius:4px;cursor:pointer;transition:.15s;
}
.card .go:hover{background:var(--neon-cyan);color:#04101a;box-shadow:0 0 16px rgba(34,230,255,.6)}
.card .go:focus-visible{outline:2px solid var(--neon-magenta);outline-offset:2px}
.card.locked{opacity:.45;filter:saturate(.4)}
.card.locked .go{border-color:var(--line);color:var(--ink-dim);cursor:not-allowed}

/* ---------- Leaderboard strip ---------- */
.board{margin-top:34px;border:1px solid var(--line);border-radius:8px;background:var(--bg-panel);padding:16px 18px}
.board h2{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--neon-cyan);margin-bottom:10px;text-shadow:0 0 8px rgba(34,230,255,.5)}
.board table{width:100%;border-collapse:collapse;font-size:12px}
.board td,.board th{padding:6px 4px;text-align:left;border-bottom:1px dashed var(--line);color:var(--ink-dim)}
.board th{color:var(--ink);letter-spacing:.14em;text-transform:uppercase;font-size:10px}
.board td.score{color:var(--neon-amber);text-align:right}
.board .empty{color:var(--ink-dim);font-size:12px;padding:8px 0}
.board button.wipe{
  margin-top:10px;appearance:none;background:none;border:1px solid var(--line);color:var(--ink-dim);
  font-family:inherit;font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:6px 12px;border-radius:4px;cursor:pointer;
}
.board button.wipe:hover{border-color:var(--neon-magenta);color:var(--neon-magenta)}

/* ---------- Game modal ---------- */
.stage{
  position:fixed;inset:0;z-index:100;display:none;flex-direction:column;
  background:rgba(6,3,14,.92);backdrop-filter:blur(6px);
}
.stage.open{display:flex}
.stage-bar{
  display:flex;align-items:center;gap:14px;padding:12px 18px;
  border-bottom:1px solid var(--line);background:var(--bg-panel);
}
.stage-bar .title{font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--neon-cyan)}
.stage-bar .live{font-size:12px;color:var(--ink-dim);margin-left:auto;display:flex;gap:18px}
.stage-bar .live b{color:var(--neon-amber)}
.stage-bar .close{
  appearance:none;border:1px solid var(--neon-magenta);background:transparent;color:var(--neon-magenta);
  font-family:inherit;font-size:11px;letter-spacing:.2em;padding:7px 14px;border-radius:4px;cursor:pointer;
}
.stage-bar .close:hover{background:var(--neon-magenta);color:#1a0410;box-shadow:0 0 14px rgba(255,46,166,.7)}
.stage .framewrap{flex:1;position:relative;overflow:hidden}
.stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#05030c}
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg-panel);border:1px solid var(--neon-amber);color:var(--neon-amber);
  padding:10px 20px;border-radius:6px;font-size:12px;letter-spacing:.14em;z-index:200;
  transition:transform .25s;box-shadow:0 0 20px rgba(255,200,87,.35);
}
.toast.show{transform:translateX(-50%) translateY(0)}
@media (max-width:640px){
  .shell{padding:18px 14px 60px}
  .stage-bar{flex-wrap:wrap;gap:8px;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top))}
  .stage-bar .live{gap:10px;font-size:11px}
  .tab{padding:9px 12px;font-size:11px}
}
footer{margin-top:40px;font-size:10px;letter-spacing:.2em;color:var(--ink-dim);text-transform:uppercase;text-align:center}
</style>
</head>
<body>

<div class="horizon"></div>
<div class="sun"></div>
<div class="gridfloor"></div>
<div class="scanlines"></div>

<div class="shell">
  <header class="masthead">
    <div>
      <div class="logo"><span class="a">NEON</span><span class="b">//GRID</span></div>
      <div class="tagline">50-cabinet procedural arcade &middot; insert coin</div>
    </div>
    <div class="credits">
      TOTAL CREDITS EARNED<br><b id="totalScore">0</b><br>
      <span id="gamesPlayed">0 sessions logged</span>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Game genres" id="tabs"></nav>

  <main>
    <div class="grid" id="grid" role="list"></div>

    <section class="board" aria-labelledby="boardTitle">
      <h2 id="boardTitle">&#9733; Global High Scores</h2>
      <div id="boardBody"></div>
      <button class="wipe" id="wipeBtn" type="button">Reset all scores</button>
    </section>
  </main>

  <footer>Neon//Grid Hub v1.0 &middot; GameBridge protocol v1 &middot; all audio &amp; art generated at runtime</footer>
</div>

<!-- ===================== GAME STAGE (modal) ===================== -->
<div class="stage" id="stage" role="dialog" aria-modal="true" aria-label="Game window">
  <div class="stage-bar">
    <span class="title" id="stageTitle">GAME</span>
    <span class="live">
      <span>SCORE <b id="liveScore">0</b></span>
      <span>LEVEL <b id="liveLevel">1</b></span>
      <span>BEST <b id="liveBest">0</b></span>
    </span>
    <button class="close" id="closeBtn" type="button">Exit [ESC]</button>
  </div>
  <div class="framewrap"><iframe id="gameFrame" title="Active game" sandbox="allow-scripts"></iframe></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- ============================================================
     BOILERPLATE / SANITY-CHECK GAME  ("Photon Pop")
     Held inert inside a <template>; loaded into the iframe via
     srcdoc. Future games ship as standalone /games/<id>.html
     files using the identical GameBridge client stub below.
     ============================================================ -->
<template id="game-boilerplate">
<meta charset="UTF-8">
<style>
  html,body{margin:0;height:100%;width:100%;background:#05030c;overflow:hidden;position:fixed;inset:0;font-family:ui-monospace,Menlo,Consolas,monospace;overscroll-behavior:none}
  canvas{display:block;width:100%;height:100%;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;cursor:crosshair}
</style>
<canvas id="c"></canvas>
<script>
/* ================= GameBridge CLIENT STUB (v1) =================
   Identical in every game. Talks to the hub via postMessage.   */
(function(){
  const GAME_ID = "photon-pop";
  function send(type, payload){ parent.postMessage({source:"GameBridge",v:1,gameId:GAME_ID,type,payload},"*"); }
  window.GameBridge = {
    id: GAME_ID,
    ready:        ()            => send("ready",{}),
    reportScore:  (score)       => send("score",{score}),
    levelUp:      (level)       => send("level",{level}),
    achievement:  (achievementId)=> send("achievement",{achievementId}),
    gameOver:     (finalScore)  => send("gameOver",{finalScore})
  };
})();

/* ================= PHOTON POP — sanity-check game =================
   Click/tap photons before their fuses expire. Infinite levels.
   Demonstrates every hub law: strict FSM, vector physics + juice,
   procedural WebAudio, procedural vector art, deterministic level
   scaling, GameBridge reporting.                                   */
(function(){
"use strict";
const cvs=document.getElementById("c"), ctx=cvs.getContext("2d");
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=document.documentElement.clientWidth||innerWidth;H=document.documentElement.clientHeight||innerHeight;cvs.width=W*DPR;cvs.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);addEventListener("orientationchange",()=>setTimeout(resize,120));resize();

/* ---------- Procedural Audio Engine ---------- */
const AudioFX=(function(){
  let ac=null;
  function ctx(){ if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==="suspended") ac.resume(); return ac; }
  function blip(f0,f1,dur,type,vol){
    const a=ctx(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(a.destination);o.start(t);o.stop(t+dur);
  }
  function noise(dur,vol){
    const a=ctx(),t=a.currentTime,len=a.sampleRate*dur,buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
    const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
    f.type="lowpass";f.frequency.setValueAtTime(3000,t);f.frequency.exponentialRampToValueAtTime(120,t+dur);
    s.buffer=buf;g.gain.value=vol;s.connect(f).connect(g).connect(a.destination);s.start(t);
  }
  return{
    unlock:ctx,
    pop:  ()=>blip(880,1760,0.09,"square",0.18),
    miss: ()=>blip(220,60,0.25,"sawtooth",0.2),
    level:()=>{blip(523,1046,0.12,"triangle",0.2);setTimeout(()=>blip(659,1318,0.12,"triangle",0.2),90);setTimeout(()=>blip(784,1568,0.16,"triangle",0.2),180);},
    boom: ()=>{noise(0.4,0.5);blip(160,40,0.4,"sawtooth",0.3);}
  };
})();

/* ---------- Juice: camera shake + particles ---------- */
const Camera={x:0,y:0,trauma:0,
  shake(a){this.trauma=Math.min(1,this.trauma+a);},
  update(dt){ this.trauma=Math.max(0,this.trauma-dt*1.8);
    const s=this.trauma*this.trauma*14;
    this.x=(Math.random()*2-1)*s; this.y=(Math.random()*2-1)*s; }
};
class Particle{
  constructor(x,y,hue){
    const a=Math.random()*Math.PI*2, sp=60+Math.random()*260;
    this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.life=this.max=0.4+Math.random()*0.5;this.hue=hue;this.r=1.5+Math.random()*2.5;
  }
  step(dt){this.life-=dt;this.vx*=Math.pow(0.02,dt);this.vy*=Math.pow(0.02,dt);this.vy+=220*dt;this.x+=this.vx*dt;this.y+=this.vy*dt;}
  draw(){const p=this.life/this.max;ctx.globalAlpha=p;
    ctx.fillStyle="hsl("+this.hue+" 100% "+(50+p*40)+"%)";
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*p+0.5,0,7);ctx.fill();ctx.globalAlpha=1;}
}
let particles=[];
function burst(x,y,hue,n){for(let i=0;i<n;i++)particles.push(new Particle(x,y,hue));}

/* ---------- Deterministic level scaling ---------- */
function levelCfg(level){
  return {
    hue:        (185 + level*23) % 360,                 // palette shift
    fuse:       Math.max(0.65, 2.6*Math.pow(0.94,level-1)), // seconds before a photon detonates
    spawnEvery: Math.max(0.28, 1.1*Math.pow(0.93,level-1)),
    drift:      40*Math.pow(1.05,level-1),              // px/s wander speed
    quota:      6 + Math.floor(level*1.5)               // pops to clear the level
  };
}

/* ---------- Photon entity (vector physics) ---------- */
class Photon{
  constructor(cfg){
    this.r=16+Math.random()*14;
    this.x=this.r+Math.random()*(W-this.r*2);
    this.y=this.r+Math.random()*(H-this.r*2);
    const a=Math.random()*Math.PI*2;
    this.vx=Math.cos(a)*cfg.drift; this.vy=Math.sin(a)*cfg.drift;
    this.fuse=cfg.fuse; this.max=cfg.fuse; this.hue=cfg.hue; this.dead=false;
  }
  step(dt){
    this.fuse-=dt;
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    if(this.x<this.r||this.x>W-this.r){this.vx*=-1;this.x=Math.max(this.r,Math.min(W-this.r,this.x));}
    if(this.y<this.r||this.y>H-this.r){this.vy*=-1;this.y=Math.max(this.r,Math.min(H-this.r,this.y));}
  }
  draw(t){
    const p=Math.max(0,this.fuse/this.max), pulse=1+0.08*Math.sin(t*10+this.x);
    ctx.save();ctx.translate(this.x,this.y);ctx.scale(pulse,pulse);
    ctx.shadowBlur=22;ctx.shadowColor="hsl("+this.hue+" 100% 60%)";
    ctx.strokeStyle="hsl("+this.hue+" 100% "+(35+p*35)+"%)";ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,this.r,0,7);ctx.stroke();
    ctx.fillStyle="hsl("+this.hue+" 100% 70% / 0.25)";ctx.fill();
    // fuse ring
    ctx.strokeStyle="#fff";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,this.r+6,-Math.PI/2,-Math.PI/2+p*Math.PI*2);ctx.stroke();
    ctx.restore();ctx.shadowBlur=0;
  }
  hit(mx,my){const dx=mx-this.x,dy=my-this.y;return dx*dx+dy*dy<=(this.r+8)*(this.r+8);}
}

/* ---------- Strict Finite State Machine ---------- */
const S={MENU:"MENU",PLAYING:"PLAYING",PAUSED:"PAUSED",GAME_OVER:"GAME_OVER"};
const game={
  state:S.MENU, level:1, score:0, lives:3, popped:0,
  photons:[], spawnT:0, cfg:levelCfg(1),
  reset(){this.level=1;this.score=0;this.lives=3;this.popped=0;this.photons=[];this.spawnT=0;this.cfg=levelCfg(1);particles=[];},
  set(next){this.state=next;}
};
GameBridge.ready();

function startRun(){game.reset();game.set(S.PLAYING);AudioFX.level();}
function advanceLevel(){
  game.level++; game.popped=0; game.cfg=levelCfg(game.level); game.photons=[];
  AudioFX.level(); Camera.shake(0.3);
  GameBridge.levelUp(game.level);
  if(game.level===5) GameBridge.achievement("photon-pop:level5");
}
function endRun(){
  game.set(S.GAME_OVER); AudioFX.boom(); Camera.shake(1);
  GameBridge.gameOver(game.score);
}

/* ---------- Input ---------- */
function pointer(e){
  const r=cvs.getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
  AudioFX.unlock();
  if(game.state===S.MENU||game.state===S.GAME_OVER){startRun();return;}
  if(game.state===S.PAUSED){game.set(S.PLAYING);return;}
  if(game.state!==S.PLAYING)return;
  for(let i=game.photons.length-1;i>=0;i--){
    const ph=game.photons[i];
    if(ph.hit(x,y)){
      game.photons.splice(i,1);
      game.score+=10*game.level; game.popped++;
      burst(ph.x,ph.y,ph.hue,26); AudioFX.pop(); Camera.shake(0.12);
      GameBridge.reportScore(game.score);
      if(game.popped>=game.cfg.quota) advanceLevel();
      return;
    }
  }
}
cvs.addEventListener("pointerdown",pointer);
addEventListener("keydown",e=>{
  if(e.key==="p"||e.key==="P"){
    if(game.state===S.PLAYING)game.set(S.PAUSED);
    else if(game.state===S.PAUSED)game.set(S.PLAYING);
  }
});

/* ---------- Main loop ---------- */
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  const t=now/1000;
  Camera.update(dt);

  if(game.state===S.PLAYING){
    game.spawnT-=dt;
    if(game.spawnT<=0){game.photons.push(new Photon(game.cfg));game.spawnT=game.cfg.spawnEvery;}
    for(const ph of game.photons)ph.step(dt);
    for(let i=game.photons.length-1;i>=0;i--){
      if(game.photons[i].fuse<=0){
        const ph=game.photons.splice(i,1)[0];
        burst(ph.x,ph.y,0,18); AudioFX.miss(); Camera.shake(0.5);
        if(--game.lives<=0){endRun();break;}
      }
    }
  }
  for(let i=particles.length-1;i>=0;i--){particles[i].step(dt);if(particles[i].life<=0)particles.splice(i,1);}

  /* ---------- Render ---------- */
  ctx.save();ctx.translate(Camera.x,Camera.y);
  ctx.fillStyle="#05030c";ctx.fillRect(-20,-20,W+40,H+40);
  // ambient level-tinted grid
  ctx.strokeStyle="hsl("+game.cfg.hue+" 80% 50% / 0.08)";ctx.lineWidth=1;
  for(let gx=0;gx<W;gx+=48){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(let gy=0;gy<H;gy+=48){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

  for(const ph of game.photons)ph.draw(t);
  for(const p of particles)p.draw();

  // HUD
  ctx.fillStyle="#e8e4ff";ctx.font="14px ui-monospace,monospace";ctx.textAlign="left";
  ctx.fillText("SCORE "+game.score,16,26);
  ctx.fillText("LEVEL "+game.level+"  ("+game.popped+"/"+game.cfg.quota+")",16,46);
  ctx.fillText("LIVES "+"\u2665".repeat(Math.max(0,game.lives)),16,66);

  ctx.textAlign="center";
  if(game.state===S.MENU){
    banner(t,"PHOTON POP","Click the photons before their fuses burn out","CLICK / TAP TO START  \u00B7  P = pause");
  }else if(game.state===S.PAUSED){
    banner(t,"PAUSED","","CLICK OR PRESS P TO RESUME");
  }else if(game.state===S.GAME_OVER){
    banner(t,"GAME OVER","FINAL SCORE "+game.score+"  \u00B7  REACHED LEVEL "+game.level,"CLICK TO RETRY");
  }
  ctx.restore();
  requestAnimationFrame(frame);
}
function banner(t,big,mid,small){
  ctx.save();
  ctx.fillStyle="rgba(5,3,12,0.72)";ctx.fillRect(-20,H/2-110,W+40,220);
  ctx.shadowBlur=24;ctx.shadowColor="hsl("+game.cfg.hue+" 100% 60%)";
  ctx.fillStyle="hsl("+game.cfg.hue+" 100% 70%)";
  ctx.font="700 42px ui-monospace,monospace";
  ctx.fillText(big,W/2,H/2-30);
  ctx.shadowBlur=0;ctx.fillStyle="#e8e4ff";ctx.font="15px ui-monospace,monospace";
  if(mid)ctx.fillText(mid,W/2,H/2+8);
  ctx.globalAlpha=0.6+0.4*Math.sin(t*4);
  ctx.fillText(small,W/2,H/2+44);
  ctx.restore();ctx.globalAlpha=1;
}
requestAnimationFrame(frame);
})();
</script>
</template>

<template id="game-maze-runner">
<meta charset="UTF-8">

<div id="cabinet">
  <div id="screenwrap"><canvas id="c" width="480" height="576"></canvas></div>
  <div id="plate"><b>MAZE&nbsp;RUNNER</b> &nbsp;·&nbsp; ARROWS / WASD &nbsp;·&nbsp; P PAUSE</div>
  <div id="pad">
    <div class="row"><button data-d="up">▲</button></div>
    <div class="row"><button data-d="left">◀</button><button data-d="down">▼</button><button data-d="right">▶</button></div>
  </div>
</div>
<script>
"use strict";
/* ================= GameBridge CLIENT STUB (v1) ================= */
(function(){
  const GAME_ID = "maze-runner";
  function send(type, payload){ parent.postMessage({source:"GameBridge",v:1,gameId:GAME_ID,type,payload},"*"); }
  window.GameBridge = {
    id: GAME_ID,
    ready:        ()             => send("ready",{}),
    reportScore:  (score)        => send("score",{score}),
    levelUp:      (level)        => send("level",{level}),
    achievement:  (achievementId)=> send("achievement",{achievementId}),
    gameOver:     (finalScore)   => send("gameOver",{finalScore})
  };
})();
GameBridge.ready();
/* ============ MAZE RUNNER — standalone HTML remake ============ */
const TILE=24, COLS=20, ROWS=22;
const cv=document.getElementById('c'), cx=cv.getContext('2d');
cv.width=COLS*TILE; cv.height=ROWS*TILE+TILE*2; // +2 rows HUD

/* Maze legend: #=wall .=pellet o=power  space=empty  P=player  E=enemy spawn  -=gate */
const LEVELS=[
[
"####################",
"#........##........#",
"#o##.###.##.###.##o#",
"#..................#",
"#.##.#.######.#.##.#",
"#....#...##...#....#",
"####.###.##.###.####",
"   #.#........#.#   ",
"####.#.##--##.#.####",
"    ...#EEEE#...    ",
"####.#.######.#.####",
"   #.#........#.#   ",
"####.#.######.#.####",
"#........##........#",
"#.##.###.##.###.##.#",
"#o.#.....P......#.o#",
"##.#.#.######.#.#.##",
"#....#...##...#....#",
"#.######.##.######.#",
"#..................#",
"#..................#",
"####################"],
[
"####################",
"#o.......##.......o#",
"#.######.##.######.#",
"#.#....#....#....#.#",
"#.#.##.####.##.#.#.#",
"#...##...##...##...#",
"###.####.##.####.###",
"#...#....##....#...#",
"#.###.##----##.###.#",
"#.....#EEEEEE#.....#",
"#.###.########.###.#",
"#...#..........#...#",
"###.#.########.#.###",
"#.....#..##..#.....#",
"#.####.#.##.#.####.#",
"#.#......P.......#.#",
"#.#.############.#.#",
"#...#..........#...#",
"#.#.#.########.#.#.#",
"#o#............#.#o#",
"#..................#",
"####################"]
];

/* ---- audio: POKEY-ish square blips ---- */
let AC=null;
function beep(f,d=.06,t='square',g=.05){
  if(!AC) return;
  const o=AC.createOscillator(),v=AC.createGain();
  o.type=t;o.frequency.value=f;v.gain.value=g;
  v.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);
  o.connect(v).connect(AC.destination);o.start();o.stop(AC.currentTime+d);
}
function initAudio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){} } }

/* ---- state ---- */
let grid,pellets,level=0,score=0,hi=0,lives=3,state='title',frame=0,frightT=0;
const player={x:0,y:0,px:0,py:0,dir:null,want:null,speed:.11};
let enemies=[];
const ECOLORS=['--enemy-red','--enemy-pink','--enemy-cyan','--runner-amber'];

function css(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()}

function loadLevel(n){
  const map=LEVELS[n%LEVELS.length];
  grid=[];pellets=0;enemies=[];
  for(let y=0;y<ROWS;y++){
    grid[y]=[];
    for(let x=0;x<COLS;x++){
      let ch=map[y][x];
      if(ch==='P'){player.x=x;player.y=y;player.px=x;player.py=y;player.dir=null;player.want=null;ch='.';}
      if(ch==='E'){enemies.push(mkEnemy(x,y,enemies.length));ch=' ';}
      if(ch==='.'||ch==='o')pellets++;
      grid[y][x]=ch;
    }
  }
  frightT=0;
}
function mkEnemy(x,y,i){
  return {x,y,px:x,py:y,dir:'left',home:{x,y},col:ECOLORS[i%4],speed:.085+i*.006,dead:false,exitT:i*120};
}

/* ---- movement helpers ---- */
const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
function walk(x,y,d,ghost){
  const [dx,dy]=DIRS[d];
  let nx=(x+dx+COLS)%COLS, ny=y+dy;
  if(ny<0||ny>=ROWS)return null;
  const t=grid[ny][nx];
  if(t==='#')return null;
  if(t==='-'&&!ghost)return null;
  return [nx,ny];
}

function stepActor(a,ghost){
  // at tile center: pick direction
  const atCenter=Math.abs(a.px-a.x)<.01&&Math.abs(a.py-a.y)<.01;
  if(atCenter){
    a.px=a.x;a.py=a.y;
    if(a===player){
      if(a.want&&walk(a.x,a.y,a.want)) a.dir=a.want;
      if(a.dir&&!walk(a.x,a.y,a.dir)) a.dir=null;
    }
    if(a.dir){
      const n=walk(a.x,a.y,a.dir,ghost);
      if(n){a.tx=n[0];a.ty=n[1];}else a.dir=null;
    }
  }
  if(a.dir){
    const [dx,dy]=DIRS[a.dir];
    a.px+=dx*a.speed; a.py+=dy*a.speed;
    // tunnel wrap
    if(a.px<-.5)a.px+=COLS; if(a.px>COLS-.5)a.px-=COLS;
    if(Math.abs(a.px-a.tx)<a.speed&&Math.abs(a.py-a.ty)<a.speed||
       (dx&&Math.sign(a.tx-a.px)!==dx&&Math.abs(a.ty-a.py)<.01)||
       (dy&&Math.sign(a.ty-a.py)!==dy&&Math.abs(a.tx-a.px)<.01)){
      a.x=a.tx;a.y=a.ty;a.px=a.tx;a.py=a.ty;
    }
  }
}

function enemyAI(e){
  const atCenter=Math.abs(e.px-e.x)<.01&&Math.abs(e.py-e.y)<.01;
  if(!atCenter)return;
  if(e.exitT>0){e.exitT--;return;}
  const opts=[];
  const rev={up:'down',down:'up',left:'right',right:'left'}[e.dir];
  for(const d in DIRS){
    if(d===rev)continue;
    if(walk(e.x,e.y,d,true))opts.push(d);
  }
  if(!opts.length){e.dir=rev;return;}
  let target=e.dead?e.home:{x:player.x,y:player.y};
  let best=opts[0],bd=frightT>0&&!e.dead?-1:1e9;
  for(const d of opts){
    const [dx,dy]=DIRS[d];
    const nx=e.x+dx,ny=e.y+dy;
    const dist=(nx-target.x)**2+(ny-target.y)**2;
    if(frightT>0&&!e.dead){ if(dist>bd){bd=dist;best=d} }
    else { if(dist<bd){bd=dist;best=d} }
  }
  // touch of chaos, like the original hardware's pseudo-random
  if(Math.random()<.12&&frightT<=0&&!e.dead)best=opts[Math.floor(Math.random()*opts.length)];
  e.dir=best;
}

/* ---- update ---- */
function update(){
  frame++;
  if(state!=='play')return;
  stepActor(player);
  const t=grid[player.y][player.x];
  if(t==='.'||t==='o'){
    grid[player.y][player.x]=' ';pellets--;score+=t==='.'?10:50;GameBridge.reportScore(score);
    beep(t==='.'?740:220,.05);
    if(t==='o'){frightT=420;enemies.forEach(e=>{if(!e.dead)e.dir={up:'down',down:'up',left:'right',right:'left'}[e.dir]||e.dir})}
    if(pellets===0){state='clear';setTimeout(()=>{level++;loadLevel(level);state='play';GameBridge.levelUp(level+1);},1600);beep(990,.4,'square',.06)}
  }
  if(frightT>0)frightT--;
  for(const e of enemies){
    enemyAI(e);stepActor(e,true);
    if(e.dead&&e.x===e.home.x&&e.y===e.home.y){e.dead=false;e.exitT=180;}
    if(Math.abs(e.px-player.px)<.55&&Math.abs(e.py-player.py)<.55){
      if(e.dead)continue;
      if(frightT>0){e.dead=true;score+=200;GameBridge.reportScore(score);beep(180,.15,'sawtooth');beep(360,.15)}
      else{ // caught
        lives--;beep(110,.5,'sawtooth',.08);
        if(lives<=0){state='over';hi=Math.max(hi,score);GameBridge.gameOver(score);}
        else{state='caught';setTimeout(()=>{respawn();state='play'},1200)}
        break;
      }
    }
  }
}
function respawn(){
  const map=LEVELS[level%LEVELS.length];
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(map[y][x]==='P'){player.x=x;player.y=y;player.px=x;player.py=y}
  player.dir=null;player.want=null;
  enemies.forEach((e,i)=>{e.x=e.home.x;e.y=e.home.y;e.px=e.x;e.py=e.y;e.dead=false;e.exitT=i*120;e.dir='left'});
  frightT=0;
}

/* ---- render ---- */
function draw(){
  cx.fillStyle=css('--crt-black');cx.fillRect(0,0,cv.width,cv.height);
  // HUD
  cx.fillStyle=css('--phosphor');cx.font='bold 16px "Courier New",monospace';
  cx.textBaseline='middle';
  cx.fillText('SCORE '+String(score).padStart(6,'0'),10,20);
  cx.fillText('HI '+String(Math.max(hi,score)).padStart(6,'0'),200,20);
  cx.fillText('LVL '+(level+1),370,20);
  for(let i=0;i<lives;i++){
    cx.fillStyle=css('--runner-amber');
    cx.beginPath();cx.arc(20+i*24,cv.height-16,8,0.6,Math.PI*2-0.6);cx.lineTo(20+i*24,cv.height-16);cx.fill();
  }
  cx.save();cx.translate(0,TILE*1.4);
  // maze
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=grid[y][x],px=x*TILE,py=y*TILE;
    if(t==='#'){
      cx.fillStyle=css('--maze-blue');
      cx.fillRect(px+2,py+2,TILE-4,TILE-4);
      cx.strokeStyle=css('--maze-glow');cx.lineWidth=2;
      cx.strokeRect(px+2,py+2,TILE-4,TILE-4);
    }else if(t==='-'){
      cx.fillStyle=css('--enemy-pink');cx.fillRect(px+2,py+TILE/2-2,TILE-4,4);
    }else if(t==='.'){
      cx.fillStyle=css('--pellet');cx.fillRect(px+TILE/2-2,py+TILE/2-2,4,4);
    }else if(t==='o'){
      if((frame>>4)&1){cx.fillStyle=css('--pellet');cx.beginPath();cx.arc(px+TILE/2,py+TILE/2,6,0,7);cx.fill()}
    }
  }
  // enemies
  for(const e of enemies){
    const px=e.px*TILE+TILE/2,py=e.py*TILE+TILE/2;
    let col=e.dead?'#556':(frightT>0?(frightT<120&&(frame>>3)&1?'#eee':'#3946e8'):css(e.col));
    cx.fillStyle=col;
    cx.beginPath();cx.arc(px,py-2,9,Math.PI,0);
    cx.lineTo(px+9,py+9);
    for(let i=0;i<3;i++)cx.lineTo(px+9-(i*2+1)*3,py+((frame>>3)&1?6:9));
    cx.lineTo(px-9,py+9);cx.closePath();cx.fill();
    cx.fillStyle='#fff';cx.fillRect(px-6,py-5,4,5);cx.fillRect(px+2,py-5,4,5);
    cx.fillStyle='#111';
    const [ex,ey]=DIRS[e.dir]||[0,0];
    cx.fillRect(px-5+ex*1.5,py-4+ey*1.5,2,3);cx.fillRect(px+3+ex*1.5,py-4+ey*1.5,2,3);
  }
  // player
  {
    const px=player.px*TILE+TILE/2,py=player.py*TILE+TILE/2;
    const mouth=.25+.2*Math.sin(frame*.3);
    const ang={right:0,down:Math.PI/2,left:Math.PI,up:-Math.PI/2}[player.dir]??0;
    cx.fillStyle=css('--runner-amber');
    cx.beginPath();cx.arc(px,py,10,ang+mouth,ang-mouth+Math.PI*2);cx.lineTo(px,py);cx.fill();
  }
  cx.restore();
  // overlays
  cx.textAlign='center';
  if(state==='title'){
    banner('MAZE RUNNER',css('--runner-amber'),cv.height/2-30);
    if((frame>>4)&1)banner('PRESS ANY KEY',css('--phosphor'),cv.height/2+20,16);
    banner('EAT EVERY PELLET · DODGE THE HUNTERS',css('--pellet'),cv.height/2+56,12);
  }else if(state==='over'){
    banner('GAME OVER',css('--enemy-red'),cv.height/2-10);
    if((frame>>4)&1)banner('PRESS ANY KEY',css('--phosphor'),cv.height/2+30,16);
  }else if(state==='clear'){
    banner('MAZE CLEAR!',css('--phosphor'),cv.height/2);
  }else if(state==='pause'){
    banner('PAUSED',css('--pellet'),cv.height/2);
  }
  cx.textAlign='left';
}
function banner(txt,col,y,size=28){
  cx.font='bold '+size+'px "Courier New",monospace';
  cx.fillStyle='rgba(0,0,0,.75)';
  const w=cx.measureText(txt).width;
  cx.fillRect(cv.width/2-w/2-14,y-size*.8,w+28,size*1.6);
  cx.fillStyle=col;cx.fillText(txt,cv.width/2,y);
}

/* ---- input ---- */
function press(d){
  initAudio();
  if(state==='title'||state==='over'){
    score=0;lives=3;level=0;loadLevel(0);state='play';beep(660,.1);beep(880,.1);
    return;
  }
  if(d&&state==='play'){player.want=d; if(!player.dir&&walk(player.x,player.y,d))player.dir=d;}
}
addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
  if(e.key==='p'||e.key==='P'){if(state==='play')state='pause';else if(state==='pause')state='play';return}
  if(map[e.key]){e.preventDefault();press(map[e.key])}
  else if(state==='title'||state==='over')press(null);
});
document.querySelectorAll('#pad button').forEach(b=>{
  const h=ev=>{ev.preventDefault();press(b.dataset.d)};
  b.addEventListener('touchstart',h);b.addEventListener('mousedown',h);
});

/* ---- boot ---- */
loadLevel(0);
(function loop(){update();draw();requestAnimationFrame(loop)})();
</script>
</template>

<template id="game-gridfall">
<meta charset="UTF-8">
<style>
  html,body{margin:0;height:100%;width:100%;background:#05030c;overflow:hidden;position:fixed;inset:0;font-family:ui-monospace,Menlo,Consolas,monospace;overscroll-behavior:none}
  canvas{display:block;width:100%;height:100%;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
</style>
<canvas id="c"></canvas>
<script>
/* ================= GameBridge CLIENT STUB (v1) ================= */
(function(){
  const GAME_ID = "gridfall";
  function send(type, payload){ parent.postMessage({source:"GameBridge",v:1,gameId:GAME_ID,type,payload},"*"); }
  window.GameBridge = {
    id: GAME_ID,
    ready:        ()             => send("ready",{}),
    reportScore:  (score)        => send("score",{score}),
    levelUp:      (level)        => send("level",{level}),
    achievement:  (achievementId)=> send("achievement",{achievementId}),
    gameOver:     (finalScore)   => send("gameOver",{finalScore})
  };
})();

/* ================= GRIDFALL =================
   Original neon falling-block stacker for the NEON//GRID hub.
   Rotate the falling tetra-shards, complete lines, survive the
   accelerating cascade. Infinite levels, deterministic scaling.
   Laws: strict FSM, juice, WebAudio-only SFX, vector art,
   GameBridge reporting. */
(function(){
"use strict";
const cvs=document.getElementById("c"), ctx=cvs.getContext("2d");
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=document.documentElement.clientWidth||innerWidth;H=document.documentElement.clientHeight||innerHeight;cvs.width=W*DPR;cvs.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);addEventListener("orientationchange",()=>setTimeout(resize,120));resize();

/* ---------- Procedural Audio Engine ---------- */
const AudioFX=(function(){
  let ac=null;
  function actx(){ if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==="suspended") ac.resume(); return ac; }
  function blip(f0,f1,dur,type,vol){
    const a=actx(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(a.destination);o.start(t);o.stop(t+dur);
  }
  function noise(dur,vol,fFrom,fTo){
    const a=actx(),t=a.currentTime,len=a.sampleRate*dur,buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
    const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
    f.type="lowpass";f.frequency.setValueAtTime(fFrom,t);f.frequency.exponentialRampToValueAtTime(fTo,t+dur);
    s.buffer=buf;g.gain.value=vol;s.connect(f).connect(g).connect(a.destination);s.start(t);
  }
  return{
    unlock:actx,
    move: ()=>blip(200,240,0.04,"square",0.06),
    rotate:()=>blip(340,520,0.06,"square",0.10),
    lock: ()=>{blip(150,90,0.08,"triangle",0.16);noise(0.06,0.10,2000,300);},
    drop: ()=>{blip(500,120,0.10,"square",0.14);noise(0.08,0.18,3500,400);},
    clear:(n)=>{ for(let i=0;i<n;i++)setTimeout(()=>blip(440*(1+i*0.25),880*(1+i*0.25),0.12,"triangle",0.18),i*70);
                 if(n>=4){noise(0.35,0.4,4000,200);} },
    level:()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,f*1.5,0.12,"triangle",0.18),i*90));},
    over: ()=>{blip(400,40,0.9,"sawtooth",0.22);noise(0.6,0.35,2000,60);}
  };
})();

/* ---------- Juice: camera shake + particles ---------- */
const Camera={x:0,y:0,trauma:0,
  shake(a){this.trauma=Math.min(1,this.trauma+a);},
  update(dt){this.trauma=Math.max(0,this.trauma-dt*1.9);
    const s=this.trauma*this.trauma*13;
    this.x=(Math.random()*2-1)*s;this.y=(Math.random()*2-1)*s;}
};
class Particle{
  constructor(x,y,hue,spread){
    const a=Math.random()*Math.PI*2,sp=(spread||1)*(60+Math.random()*240);
    this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-60;
    this.life=this.max=0.35+Math.random()*0.5;this.hue=hue;this.r=1.5+Math.random()*2.6;
  }
  step(dt){this.life-=dt;this.vx*=Math.pow(0.03,dt);this.vy*=Math.pow(0.05,dt);this.vy+=340*dt;this.x+=this.vx*dt;this.y+=this.vy*dt;}
  draw(){const p=this.life/this.max;ctx.globalAlpha=p;
    ctx.fillStyle="hsl("+this.hue+" 100% "+(55+p*35)+"%)";
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*p+0.4,0,7);ctx.fill();ctx.globalAlpha=1;}
}
let particles=[];
function burst(x,y,hue,n,spread){for(let i=0;i<n;i++)particles.push(new Particle(x,y,hue,spread));}

/* ---------- Deterministic level scaling ---------- */
function levelCfg(level){
  return{
    hue:(265+level*31)%360,                              // palette shift per level
    gravity:Math.max(0.05,0.85*Math.pow(0.88,level-1)),  // seconds per row fall
    lockDelay:Math.max(0.18,0.5*Math.pow(0.96,level-1)),
    linesToAdvance:10
  };
}

/* ---------- Pieces (tetra-shards) ---------- */
const SHAPES={
  I:{c:0,  m:[[0,1],[1,1],[2,1],[3,1]],w:4},
  O:{c:1,  m:[[1,0],[2,0],[1,1],[2,1]],w:4},
  T:{c:2,  m:[[1,0],[0,1],[1,1],[2,1]],w:3},
  S:{c:3,  m:[[1,0],[2,0],[0,1],[1,1]],w:3},
  Z:{c:4,  m:[[0,0],[1,0],[1,1],[2,1]],w:3},
  J:{c:5,  m:[[0,0],[0,1],[1,1],[2,1]],w:3},
  L:{c:6,  m:[[2,0],[0,1],[1,1],[2,1]],w:3}
};
const NAMES=Object.keys(SHAPES);
function hueFor(ci,base){return (base+ci*38)%360;}
function rotated(cells,w,times){
  let out=cells.map(c=>c.slice());
  for(let r=0;r<((times%4)+4)%4;r++) out=out.map(([x,y])=>[w-1-y,x]);
  return out;
}

/* ---------- Seeded RNG + 7-bag ---------- */
function rngFactory(seed){
  let a=seed>>>0;
  return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);
    t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};
}
function makeBag(rand){
  const bag=NAMES.slice();
  for(let i=bag.length-1;i>0;i--){const j=(rand()*(i+1))|0;[bag[i],bag[j]]=[bag[j],bag[i]];}
  return bag;
}

/* ---------- Board ---------- */
const BW=10,BH=20;

/* ---------- Strict Finite State Machine ---------- */
const S={MENU:"MENU",PLAYING:"PLAYING",PAUSED:"PAUSED",GAME_OVER:"GAME_OVER"};
const game={
  state:S.MENU,level:1,score:0,lines:0,cfg:levelCfg(1),
  board:null,piece:null,next:[],bag:[],rand:rngFactory(Date.now()>>>0),
  hold:null,holdUsed:false,
  fallT:0,lockT:0,grounded:false,clearFx:[],combo:0,
  set(n){this.state=n;}
};
GameBridge.ready();

function newBoard(){return Array.from({length:BH},()=>Array(BW).fill(-1));}
function pullPiece(){
  if(game.bag.length===0)game.bag=makeBag(game.rand);
  const name=game.bag.pop(),s=SHAPES[name];
  return{name,cells:s.m.map(c=>c.slice()),w:s.w,ci:s.c,x:3,y:name==="I"?-1:0,rot:0};
}
function collides(p,dx,dy,cells){
  const cs=cells||p.cells;
  for(const[cx,cy]of cs){
    const x=p.x+cx+dx,y=p.y+cy+dy;
    if(x<0||x>=BW||y>=BH)return true;
    if(y>=0&&game.board[y][x]>=0)return true;
  }
  return false;
}
function spawn(){
  game.piece=game.next.shift()||pullPiece();
  while(game.next.length<3)game.next.push(pullPiece());
  game.fallT=0;game.lockT=0;game.grounded=false;game.holdUsed=false;
  if(collides(game.piece,0,0)){endRun();}
}
function startRun(){
  game.level=1;game.score=0;game.lines=0;game.combo=0;
  game.cfg=levelCfg(1);game.board=newBoard();
  game.bag=[];game.next=[];game.clearFx=[];particles=[];
  game.hold=null;game.holdUsed=false;
  spawn();game.set(S.PLAYING);AudioFX.level();
}
function endRun(){
  game.set(S.GAME_OVER);AudioFX.over();Camera.shake(1);
  GameBridge.gameOver(game.score);
}
function ghostDrop(p){let d=0;while(!collides(p,0,d+1))d++;return d;}
function lockPiece(hard){
  const p=game.piece;
  for(const[cx,cy]of p.cells){
    const y=p.y+cy,x=p.x+cx;
    if(y<0){endRun();return;}
    game.board[y][x]=p.ci;
  }
  hard?AudioFX.drop():AudioFX.lock();
  Camera.shake(hard?0.3:0.12);
  // line clears
  const full=[];
  for(let y=0;y<BH;y++)if(game.board[y].every(v=>v>=0))full.push(y);
  if(full.length){
    const pts=[0,100,300,500,800][full.length]*game.level;
    game.combo++;
    game.score+=pts+(game.combo>1?50*game.combo*game.level:0);
    game.lines+=full.length;
    AudioFX.clear(full.length);
    Camera.shake(0.15*full.length+(full.length>=4?0.4:0));
    for(const y of full){
      game.clearFx.push({y,t:0.28});
      for(let x=0;x<BW;x++)
        burst(pX(x)+CELL/2,pY(y)+CELL/2,hueFor(game.board[y][x],game.cfg.hue),6,full.length>=4?1.6:1);
      game.board.splice(y,1);game.board.unshift(Array(BW).fill(-1));
    }
    if(full.length>=4)GameBridge.achievement("gridfall:quad-clear");
    GameBridge.reportScore(game.score);
    // level advance
    const target=game.level*game.cfg.linesToAdvance;
    if(game.lines>=target){
      game.level++;game.cfg=levelCfg(game.level);
      AudioFX.level();Camera.shake(0.3);
      GameBridge.levelUp(game.level);
      if(game.level===5)GameBridge.achievement("gridfall:level5");
      if(game.level===10)GameBridge.achievement("gridfall:level10");
    }
  }else{
    game.combo=0;
  }
  spawn();
}

/* ---------- Movement ---------- */
function tryMove(dx,dy){
  if(collides(game.piece,dx,dy))return false;
  game.piece.x+=dx;game.piece.y+=dy;
  if(dx)AudioFX.move();
  return true;
}
function tryRotate(dir){
  const p=game.piece;
  if(p.name==="O")return;
  const cells=rotated(SHAPES[p.name].m,p.w,p.rot+dir);
  // wall kicks: try in place, then shift left/right/up
  const kicks=[[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,-1]];
  for(const[kx,ky]of kicks){
    if(!collides(p,kx,ky,cells)){
      p.cells=cells;p.rot=(p.rot+dir+4)%4;p.x+=kx;p.y+=ky;
      AudioFX.rotate();return;
    }
  }
}
function hardDrop(){
  const d=ghostDrop(game.piece);
  game.piece.y+=d;
  game.score+=d*2;GameBridge.reportScore(game.score);
  lockPiece(true);
}
function freshPiece(name){
  const s=SHAPES[name];
  return{name,cells:s.m.map(c=>c.slice()),w:s.w,ci:s.c,x:3,y:name==="I"?-1:0,rot:0};
}
function holdPiece(){
  if(game.holdUsed)return;          // once per piece, re-armed on lock
  const cur=game.piece.name;
  if(game.hold===null){
    game.hold=cur;
    game.piece=game.next.shift()||pullPiece();
    while(game.next.length<3)game.next.push(pullPiece());
  }else{
    const swap=game.hold;game.hold=cur;
    game.piece=freshPiece(swap);    // fresh orientation, standard spawn spot
  }
  game.holdUsed=true;
  game.fallT=0;game.lockT=0;game.grounded=false;
  AudioFX.rotate();Camera.shake(0.06);
  burst(pX(game.piece.x+1.5)+CELL/2,pY(Math.max(0,game.piece.y)+0.5)+CELL/2,hueFor(game.piece.ci,game.cfg.hue),10,0.6);
  if(collides(game.piece,0,0))endRun();
}

/* ---------- Input (DAS-style repeat) ---------- */
const held={};
addEventListener("keydown",e=>{
  AudioFX.unlock();
  const k=e.key;
  if(k==="p"||k==="P"){
    if(game.state===S.PLAYING)game.set(S.PAUSED);
    else if(game.state===S.PAUSED)game.set(S.PLAYING);
    return;
  }
  if(game.state===S.MENU||game.state===S.GAME_OVER){
    if(k===" "||k==="Enter"||k.startsWith("Arrow")){e.preventDefault();startRun();}
    return;
  }
  if(game.state!==S.PLAYING)return;
  if(e.repeat&&(k==="ArrowUp"||k===" "))return;
  switch(k){
    case"ArrowLeft":case"a":case"A":e.preventDefault();tryMove(-1,0);held.dir=-1;held.t=0.16;break;
    case"ArrowRight":case"d":case"D":e.preventDefault();tryMove(1,0);held.dir=1;held.t=0.16;break;
    case"ArrowDown":case"s":case"S":e.preventDefault();held.soft=true;break;
    case"ArrowUp":case"w":case"W":case"x":case"X":e.preventDefault();tryRotate(1);break;
    case"z":case"Z":e.preventDefault();tryRotate(-1);break;
    case" ":e.preventDefault();hardDrop();break;
    case"c":case"C":case"Shift":e.preventDefault();holdPiece();break;
  }
});
addEventListener("keyup",e=>{
  const k=e.key;
  if(k==="ArrowLeft"||k==="a"||k==="A"){if(held.dir===-1)held.dir=0;}
  if(k==="ArrowRight"||k==="d"||k==="D"){if(held.dir===1)held.dir=0;}
  if(k==="ArrowDown"||k==="s"||k==="S")held.soft=false;
});
// touch: on-screen button bar + swipe gestures
let tStart=null;
function btnAt(x,y){return BTNS.find(b=>x>=b.x&&x<=b.x+b.w&&y>=b.y-6&&y<=b.y+b.h+6);}
function pressBtn(b){
  switch(b.act){
    case"L":tryMove(-1,0);held.dir=-1;held.t=0.18;break;
    case"R":tryMove(1,0);held.dir=1;held.t=0.18;break;
    case"ROT":tryRotate(1);break;
    case"SOFT":held.soft=true;break;
    case"DROP":hardDrop();break;
    case"HOLD":holdPiece();break;
  }
}
function releaseTouch(){
  if(!TOUCH)return;
  for(const b of BTNS)b.hot=false;
  held.dir=0;held.soft=false;
}
cvs.addEventListener("pointerdown",e=>{
  AudioFX.unlock();
  if(game.state===S.MENU||game.state===S.GAME_OVER){startRun();return;}
  if(game.state===S.PAUSED){game.set(S.PLAYING);return;}
  const b=TOUCH?btnAt(e.clientX,e.clientY):null;
  if(b){b.hot=true;pressBtn(b);return;}
  tStart=[e.clientX,e.clientY];
});
cvs.addEventListener("pointerup",e=>{
  releaseTouch();
  if(!tStart||game.state!==S.PLAYING)return;
  const dx=e.clientX-tStart[0],dy=e.clientY-tStart[1];
  if(dy>60&&Math.abs(dy)>Math.abs(dx)){hardDrop();}
  else if(dy<-60&&Math.abs(dy)>Math.abs(dx)){holdPiece();}
  else if(Math.abs(dx)>=24){tryMove(dx<0?-1:1,0);}
  tStart=null;
});
cvs.addEventListener("pointercancel",()=>{releaseTouch();tStart=null;});
cvs.addEventListener("contextmenu",e=>e.preventDefault());

/* ---------- Layout ---------- */
let CELL=24,OX=0,OY=0,BTNS=[];
const TOUCH=(window.matchMedia?matchMedia("(pointer: coarse)").matches:false)||("ontouchstart" in window);
function layout(){
  const barH=TOUCH?Math.max(64,Math.min(96,H*0.12)):0;
  CELL=Math.floor(Math.min((H-70-barH)/BH,(W-40)/(BW+8)));
  OX=(W-(BW+7)*CELL)/2;OY=Math.max(34,(H-barH-BH*CELL)/2+12);
  if(TOUCH){
    const n=6,gap=8,bw=Math.min(96,(W-gap*(n+1))/n),bh=barH-14,y=H-bh-8;
    const x0=(W-(n*bw+(n-1)*gap))/2;
    const defs=[["\u25C0","L"],["\u25B6","R"],["\u27F3","ROT"],["\u25BC","SOFT"],["\u2913","DROP"],["H","HOLD"]];
    BTNS=defs.map(([label,act],i)=>({x:x0+i*(bw+gap),y,w:bw,h:bh,label,act,hot:false}));
  }
}
function pX(x){return OX+x*CELL;}
function pY(y){return OY+y*CELL;}

/* ---------- Update ---------- */
function update(dt){
  // horizontal auto-repeat
  if(held.dir){
    held.t-=dt;
    if(held.t<=0){tryMove(held.dir,0);held.t=0.05;}
  }
  const p=game.piece;
  const g=held.soft?Math.min(0.04,game.cfg.gravity):game.cfg.gravity;
  game.fallT+=dt;
  while(game.fallT>=g){
    game.fallT-=g;
    if(!collides(p,0,1)){
      p.y++;
      if(held.soft){game.score+=1;GameBridge.reportScore(game.score);}
      game.grounded=false;game.lockT=0;
    }else{
      game.grounded=true;break;
    }
  }
  if(game.grounded){
    game.lockT+=dt;
    if(game.lockT>=game.cfg.lockDelay){lockPiece(false);}
  }
  for(let i=game.clearFx.length-1;i>=0;i--){
    game.clearFx[i].t-=dt;
    if(game.clearFx[i].t<=0)game.clearFx.splice(i,1);
  }
}

/* ---------- Render ---------- */
function drawCell(x,y,ci,alpha,ghost){
  const px=pX(x),py=pY(y),hue=hueFor(ci,game.cfg.hue);
  ctx.globalAlpha=alpha;
  if(ghost){
    ctx.strokeStyle="hsl("+hue+" 100% 60% / 0.45)";ctx.lineWidth=2;
    ctx.strokeRect(px+2.5,py+2.5,CELL-5,CELL-5);
  }else{
    ctx.shadowBlur=10;ctx.shadowColor="hsl("+hue+" 100% 55%)";
    ctx.fillStyle="hsl("+hue+" 85% 22%)";
    ctx.fillRect(px+1.5,py+1.5,CELL-3,CELL-3);
    ctx.strokeStyle="hsl("+hue+" 100% 62%)";ctx.lineWidth=2;
    ctx.strokeRect(px+2,py+2,CELL-4,CELL-4);
    ctx.fillStyle="hsl("+hue+" 100% 75% / 0.35)";
    ctx.fillRect(px+3,py+3,CELL-6,(CELL-6)*0.28);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}
function drawPieceAt(cells,bx,by,ci,alpha,ghost){
  for(const[cx,cy]of cells){
    const y=by+cy;
    if(y>=0)drawCell(bx+cx,y,ci,alpha,ghost);
  }
}
function drawButtons(){
  ctx.save();ctx.font="700 "+Math.min(22,BTNS[0]?BTNS[0].h*0.42:20)+"px ui-monospace,monospace";
  ctx.textAlign="center";ctx.textBaseline="middle";
  for(const b of BTNS){
    ctx.globalAlpha=b.hot?0.95:0.55;
    ctx.fillStyle="hsl("+game.cfg.hue+" 70% 14%)";
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle="hsl("+game.cfg.hue+" 100% 60%)";ctx.lineWidth=2;
    ctx.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);
    ctx.fillStyle="hsl("+game.cfg.hue+" 100% 78%)";
    ctx.fillText(b.label,b.x+b.w/2,b.y+b.h/2+1);
  }
  ctx.restore();
}
function banner(t,big,mid,small){
  ctx.save();
  ctx.fillStyle="rgba(5,3,12,0.78)";ctx.fillRect(-20,H/2-110,W+40,220);
  ctx.textAlign="center";
  ctx.shadowBlur=24;ctx.shadowColor="hsl("+game.cfg.hue+" 100% 60%)";
  ctx.fillStyle="hsl("+game.cfg.hue+" 100% 70%)";
  ctx.font="700 40px ui-monospace,monospace";
  ctx.fillText(big,W/2,H/2-30);
  ctx.shadowBlur=0;ctx.fillStyle="#e8e4ff";ctx.font="14px ui-monospace,monospace";
  if(mid)ctx.fillText(mid,W/2,H/2+8);
  ctx.globalAlpha=0.6+0.4*Math.sin(t*4);
  ctx.fillText(small,W/2,H/2+44);
  ctx.restore();ctx.globalAlpha=1;
}
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  const t=now/1000;
  layout();Camera.update(dt);
  if(game.state===S.PLAYING)update(dt);
  for(let i=particles.length-1;i>=0;i--){particles[i].step(dt);if(particles[i].life<=0)particles.splice(i,1);}

  ctx.save();ctx.translate(Camera.x,Camera.y);
  ctx.fillStyle="#05030c";ctx.fillRect(-20,-20,W+40,H+40);

  const hue=game.cfg.hue;
  // well frame
  ctx.shadowBlur=18;ctx.shadowColor="hsl("+hue+" 100% 55%)";
  ctx.strokeStyle="hsl("+hue+" 100% 55%)";ctx.lineWidth=2;
  ctx.strokeRect(pX(0)-3,pY(0)-3,BW*CELL+6,BH*CELL+6);
  ctx.shadowBlur=0;
  // faint grid
  ctx.strokeStyle="hsl("+hue+" 80% 50% / 0.10)";ctx.lineWidth=1;
  for(let x=1;x<BW;x++){ctx.beginPath();ctx.moveTo(pX(x),pY(0));ctx.lineTo(pX(x),pY(BH));ctx.stroke();}
  for(let y=1;y<BH;y++){ctx.beginPath();ctx.moveTo(pX(0),pY(y));ctx.lineTo(pX(BW),pY(y));ctx.stroke();}

  if(game.board){
    for(let y=0;y<BH;y++)for(let x=0;x<BW;x++)
      if(game.board[y][x]>=0)drawCell(x,y,game.board[y][x],1,false);
    // line-clear flash
    for(const fx of game.clearFx){
      ctx.globalAlpha=fx.t/0.28;
      ctx.fillStyle="#fff";
      ctx.fillRect(pX(0),pY(fx.y),BW*CELL,CELL);
      ctx.globalAlpha=1;
    }
    if(game.state===S.PLAYING||game.state===S.PAUSED){
      const p=game.piece;
      drawPieceAt(p.cells,p.x,p.y+ghostDrop(p),p.ci,1,true);   // ghost
      drawPieceAt(p.cells,p.x,p.y,p.ci,1,false);               // live
    }
    // side panel: HOLD box + NEXT queue
    const nx=pX(BW)+CELL*1.2;
    ctx.fillStyle="#9a8fc7";ctx.font="12px ui-monospace,monospace";ctx.textAlign="left";
    ctx.fillText("HOLD"+(game.holdUsed?" \u2715":""),nx,pY(0)+12);
    if(game.hold){
      const s=SHAPES[game.hold],hh=hueFor(s.c,hue);
      ctx.globalAlpha=game.holdUsed?0.4:1;   // dimmed until it re-arms
      for(const[cx,cy]of s.m){
        const px=nx+cx*CELL*0.7, py=pY(0)+22+cy*CELL*0.7;
        ctx.fillStyle="hsl("+hh+" 85% 25%)";
        ctx.fillRect(px,py,CELL*0.7-2,CELL*0.7-2);
        ctx.strokeStyle="hsl("+hh+" 100% 60%)";ctx.lineWidth=1.5;
        ctx.strokeRect(px+0.5,py+0.5,CELL*0.7-3,CELL*0.7-3);
      }
      ctx.globalAlpha=1;
    }
    const nyBase=pY(0)+CELL*2.8;
    ctx.fillStyle="#9a8fc7";
    ctx.fillText("NEXT",nx,nyBase+12);
    game.next.slice(0,3).forEach((n,i)=>{
      for(const[cx,cy]of n.cells){
        const px=nx+cx*CELL*0.7, py=nyBase+26+i*CELL*3+cy*CELL*0.7;
        const h=hueFor(n.ci,hue);
        ctx.fillStyle="hsl("+h+" 85% 25%)";
        ctx.fillRect(px,py,CELL*0.7-2,CELL*0.7-2);
        ctx.strokeStyle="hsl("+h+" 100% 60%)";ctx.lineWidth=1.5;
        ctx.strokeRect(px+0.5,py+0.5,CELL*0.7-3,CELL*0.7-3);
      }
    });
  }
  for(const p of particles)p.draw();

  // HUD
  ctx.textAlign="left";ctx.fillStyle="#e8e4ff";ctx.font="14px ui-monospace,monospace";
  ctx.fillText("SCORE "+game.score,16,26);
  ctx.fillText("LEVEL "+game.level,16,48);
  ctx.fillText("LINES "+game.lines,16,70);
  if(TOUCH&&(game.state===S.PLAYING||game.state===S.PAUSED))drawButtons();

  if(game.state===S.MENU){
    banner(t,"GRIDFALL","Stack the shards \u00B7 complete lines \u00B7 outlast the cascade","\u2190\u2192 MOVE \u00B7 \u2191/Z ROTATE \u00B7 \u2193 SOFT \u00B7 SPACE DROP \u00B7 C HOLD \u00B7 P PAUSE \u00B7 ANY ARROW TO START");
  }else if(game.state===S.PAUSED){
    banner(t,"PAUSED","","PRESS P TO RESUME");
  }else if(game.state===S.GAME_OVER){
    banner(t,"GAME OVER","FINAL SCORE "+game.score+" \u00B7 LEVEL "+game.level+" \u00B7 "+game.lines+" LINES","ARROWS / TAP TO RETRY");
  }
  ctx.restore();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</template>


<script>
/* ============================================================
   HUB CONTROLLER
   ============================================================ */
(function(){
"use strict";

/* ---------- Game registry ----------
   Each cabinet: {id, title, genre, src}
   src === "embedded:<tplId>" -> loads <template id="game-<tplId>">
   via iframe srcdoc. ALL games live inside this single file as
   inert templates; nothing external is ever fetched.
   Locked slots render dimmed until their template ships. */
const GENRES=["Action","Puzzle","Retro","Sports","Strategy"];
const REGISTRY=[
  {id:"photon-pop",  title:"Photon Pop",  genre:"Retro",  src:"embedded:boilerplate"},
  {id:"maze-runner", title:"Maze Runner", genre:"Retro",  src:"embedded:maze-runner"},
  {id:"gridfall",    title:"Gridfall",    genre:"Puzzle", src:"embedded:gridfall"}
];
// Reserve the remaining 49 cabinet slots, spread across genres.
(function reserveSlots(){
  const perGenre=10; // 5 genres x 10 = 50 cabinets
  GENRES.forEach(g=>{
    const have=REGISTRY.filter(r=>r.genre===g).length;
    for(let i=have;i<perGenre;i++){
      const n=i+1;
      REGISTRY.push({id:g.toLowerCase()+"-slot-"+String(n).padStart(2,"0"),
        title:"CABINET //"+g.toUpperCase().slice(0,3)+"-"+String(n).padStart(2,"0"),
        genre:g,src:null});
    }
  });
})();

/* ---------- High-score store (localStorage) ---------- */
const Store={
  KEY:"neonGrid.v1",
  load(){
    try{ return JSON.parse(localStorage.getItem(this.KEY)) || {scores:{},sessions:0,achievements:[]}; }
    catch(e){ return {scores:{},sessions:0,achievements:[]}; }
  },
  save(d){ try{ localStorage.setItem(this.KEY,JSON.stringify(d)); }catch(e){/* storage full or blocked */} },
  best(id){ return this.load().scores[id]?.best || 0; },
  submit(id,score){
    const d=this.load(); const rec=d.scores[id]||{best:0,plays:0,updated:0};
    rec.plays++; d.sessions++;
    const isRecord=score>rec.best;
    if(isRecord){ rec.best=score; rec.updated=Date.now(); }
    d.scores[id]=rec; this.save(d); return isRecord;
  },
  unlock(achId){
    const d=this.load();
    if(!d.achievements.includes(achId)){ d.achievements.push(achId); this.save(d); return true; }
    return false;
  },
  wipe(){ localStorage.removeItem(this.KEY); }
};

/* ---------- DOM refs ---------- */
const $=s=>document.querySelector(s);
const tabsEl=$("#tabs"), gridEl=$("#grid"), boardBody=$("#boardBody"),
      stage=$("#stage"), frame=$("#gameFrame"), stageTitle=$("#stageTitle"),
      liveScore=$("#liveScore"), liveLevel=$("#liveLevel"), liveBest=$("#liveBest"),
      toast=$("#toast"), totalScore=$("#totalScore"), gamesPlayed=$("#gamesPlayed");

let activeTab="Action", activeGame=null, toastTimer=null;

/* ---------- Toast ---------- */
function notify(msg){
  toast.textContent=msg; toast.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove("show"),2600);
}

/* ---------- Header stats ---------- */
function renderStats(){
  const d=Store.load();
  const total=Object.values(d.scores).reduce((a,r)=>a+r.best,0);
  totalScore.textContent=total.toLocaleString();
  gamesPlayed.textContent=d.sessions+" sessions logged";
}

/* ---------- Tabs ---------- */
function renderTabs(){
  tabsEl.innerHTML="";
  GENRES.forEach(g=>{
    const n=REGISTRY.filter(r=>r.genre===g&&r.src).length;
    const b=document.createElement("button");
    b.className="tab"; b.role="tab";
    b.setAttribute("aria-selected",String(g===activeTab));
    b.innerHTML=g+' <span class="count">'+n+"/10</span>";
    b.onclick=()=>{activeTab=g;renderTabs();renderGrid();};
    tabsEl.appendChild(b);
  });
}

/* ---------- Grid ---------- */
function renderGrid(){
  gridEl.innerHTML="";
  REGISTRY.filter(r=>r.genre===activeTab).forEach(r=>{
    const card=document.createElement("div");
    card.className="card "+(r.src?"playable":"locked");
    card.role="listitem";
    const best=Store.best(r.id);
    card.innerHTML=
      '<div class="genre">'+r.genre+"</div>"+
      "<h3>"+r.title+"</h3>"+
      '<div class="hs">'+(r.src?("HIGH SCORE <b>"+best.toLocaleString()+"</b>"):"AWAITING ROM UPLOAD")+"</div>"+
      '<button class="go" type="button" '+(r.src?"":"disabled")+">"+(r.src?"Insert coin":"Locked")+"</button>";
    if(r.src) card.querySelector(".go").onclick=()=>launch(r);
    gridEl.appendChild(card);
  });
}

/* ---------- Leaderboard ---------- */
function renderBoard(){
  const d=Store.load();
  const rows=Object.entries(d.scores)
    .map(([id,rec])=>({id,...rec,title:(REGISTRY.find(r=>r.id===id)||{title:id}).title}))
    .sort((a,b)=>b.best-a.best).slice(0,10);
  if(!rows.length){ boardBody.innerHTML='<div class="empty">No scores yet — insert a coin to make history.</div>'; return; }
  boardBody.innerHTML="<table><tr><th>#</th><th>Game</th><th>Plays</th><th style='text-align:right'>Best</th></tr>"+
    rows.map((r,i)=>"<tr><td>"+(i+1)+"</td><td>"+r.title+"</td><td>"+r.plays+'</td><td class="score">'+r.best.toLocaleString()+"</td></tr>").join("")+
    "</table>";
}

/* ---------- Launch / close ---------- */
function launch(entry){
  activeGame=entry;
  stageTitle.textContent=entry.title;
  liveScore.textContent="0"; liveLevel.textContent="1";
  liveBest.textContent=Store.best(entry.id).toLocaleString();
  if(entry.src.startsWith("embedded:")){
    frame.removeAttribute("src");
    frame.srcdoc=document.getElementById("game-"+entry.src.slice(9)).innerHTML;
  }else{
    frame.removeAttribute("srcdoc"); frame.src=entry.src;
  }
  stage.classList.add("open");
  frame.focus();
}
function closeStage(){
  stage.classList.remove("open");
  frame.srcdoc=""; frame.removeAttribute("src");
  activeGame=null;
  renderGrid(); renderBoard(); renderStats();
}
$("#closeBtn").onclick=closeStage;
addEventListener("keydown",e=>{ if(e.key==="Escape"&&stage.classList.contains("open")) closeStage(); });

/* ---------- GameBridge host (postMessage protocol v1) ---------- */
addEventListener("message",(e)=>{
  const m=e.data;
  if(!m || m.source!=="GameBridge" || m.v!==1) return;
  if(!activeGame) return;
  // Trust boundary: only accept messages from the active sandboxed frame.
  if(e.source!==frame.contentWindow) return;
  const id=activeGame.id;
  switch(m.type){
    case "ready":
      notify(activeGame.title+" linked to GameBridge \u2713");
      break;
    case "score":
      liveScore.textContent=Number(m.payload.score||0).toLocaleString();
      break;
    case "level":
      liveLevel.textContent=String(m.payload.level||1);
      notify("LEVEL "+m.payload.level+" \u2014 difficulty amplified");
      break;
    case "achievement":
      if(Store.unlock(String(m.payload.achievementId)))
        notify("ACHIEVEMENT UNLOCKED: "+m.payload.achievementId);
      break;
    case "gameOver":{
      const s=Math.max(0,Math.floor(Number(m.payload.finalScore)||0));
      const record=Store.submit(id,s);
      liveBest.textContent=Store.best(id).toLocaleString();
      notify(record ? "\u2605 NEW HIGH SCORE: "+s.toLocaleString()+" \u2605"
                    : "Run logged: "+s.toLocaleString());
      renderStats(); renderBoard();
      break;
    }
  }
});

/* ---------- Wipe ---------- */
$("#wipeBtn").onclick=()=>{
  if(confirm("Erase every high score and achievement?")){
    Store.wipe(); renderStats(); renderBoard(); renderGrid();
    notify("Memory core wiped.");
  }
};

/* ---------- Boot ---------- */
renderTabs(); renderGrid(); renderBoard(); renderStats();
})();
</script>
</body>
</html>
