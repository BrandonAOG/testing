          var isGood = (v === 'good' || v === 'y' || v === 'yes' || v === 'full' || v === 'normal' || v === 'clean');
          var isBad  = (v === 'n' || v === 'no' || v === 'poor' || v === 'replace' || v === 'abn' || v === 'empty' || v === 'broken' || v === 'damaged');
          var fill = isGood ? '#059669' : (isBad ? '#DC2626' : '#0891b2');
          var box = document.createElement('span');
          box.className = 'box-proxy';
          var base = 'display:inline-block;box-sizing:border-box;flex-shrink:0;' +
                     'width:' + size + 'px;height:' + size + 'px;' +
                     'border-radius:' + (isRadio ? '50%' : '2px') + ';' +
                     'vertical-align:middle;position:relative;margin:' + cs.margin + ';';
          if (el.checked) {
            box.style.cssText = base + 'background:' + fill + ';border:1.5px solid ' + fill + ';';
            if (isRadio) {
              // inner white dot
              var dot = document.createElement('span');
              dot.style.cssText = 'position:absolute;left:50%;top:50%;width:' + (size*0.4) +
                'px;height:' + (size*0.4) + 'px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);';
              box.appendChild(dot);
            } else {
              // white checkmark
              var chk = document.createElement('span');
              chk.style.cssText = 'position:absolute;left:50%;top:48%;width:' + (size*0.28) +
                'px;height:' + (size*0.55) + 'px;border:solid #fff;border-width:0 2px 2px 0;' +
                'transform:translate(-50%,-55%) rotate(45deg);';
              box.appendChild(chk);
            }
          } else {
            box.style.cssText = base + 'background:#fff;border:1.5px solid #9CA3AF;';
          }
          el.style.display = 'none';
          el.parentNode.insertBefore(box, el.nextSibling);
          _boxProxies.push({ input: el, box: box });
        });
      }
      function removeBoxProxies() {
        _boxProxies.forEach(function(p){
          if (p.box && p.box.parentNode) p.box.parentNode.removeChild(p.box);
          p.input.style.display = '';
        });
        _boxProxies = [];
      }

      function restoreCapture() {
        if (_capVp && _capOrigVP != null) _capVp.setAttribute('content', _capOrigVP);
        page.style.width     = prevWidth;
        page.style.maxWidth  = prevMaxWidth;
        page.style.height    = prevHeight;
        page.style.minHeight = prevMinHeight;
        page.style.marginTop = prevMarginTop;
        page.style.paddingTop = prevPaddingTop;
        document.body.style.padding = prevBodyPad;
        const fs = document.getElementById('capture-force-style');
        if (fs) fs.remove();
        removeNoteProxies();
        removeBoxProxies();
        _phSaved.forEach(function(p){ if (p[1] != null) p[0].setAttribute('placeholder', p[1]); });
        _phSaved = [];
        if (logoImg && logoOrigSrc) {
          logoImg.src = logoOrigSrc;
          logoImg.style.visibility = '';
        }
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          buildNoteProxies();
          buildBoxProxies();
          // Force a reflow so the force-style layout (incl. the now-static
          // footer) is fully applied, THEN measure — reading the height inline
          // earlier captured the pre-reflow height and cut off the footer.
          void page.offsetHeight;
          // Measure capture height from the footer's actual bottom edge (the
          // page can settle taller than offset/scrollHeight reported earlier,
          // clipping the footer). Use the furthest-down content edge + pad.
          var _pr = page.getBoundingClientRect();
          var _ftEl = page.querySelector('.footer');
          var _ftBottom = _ftEl ? (_ftEl.getBoundingClientRect().bottom - _pr.top) : 0;
          // Also account for the page element's own rendered bottom edge so the
          // bottom border/corner brackets are never clipped — important for the
          // short "power test performed" collapsed view where the page is small.
          var _pageBottom = _pr.height;
          // Measure the content height, then deliberately OVERSHOOT by 400px.
          // The extra area renders as plain white (backgroundColor below), so the
          // form bottom can never be clipped regardless of device/DPR rounding.
          // The trailing white is measured away by the trim step after capture.
          var _contentH = Math.ceil(Math.max(page.scrollHeight, page.offsetHeight, _ftBottom, _pageBottom)) + 48;
          var _capH = _contentH + 400;
          html2canvas(page, {
            scale: 2,
            useCORS: true,
            allowTaint: true,   // render even if a resource is cross-origin
            backgroundColor: '#ffffff',
            logging: false,
            width:       CAPTURE_WIDTH,
            height:      _capH,
            windowWidth: CAPTURE_WIDTH,
            // CRITICAL: without windowHeight, html2canvas clones into a window
            // only as tall as the real device viewport. Content below that fold
            // then fails to render and the bottom clips — and since viewport
            // height differs per device, the clip differs per device. Match the
            // window height to the full capture height so everything renders.
            windowHeight: _capH,
            scrollX: 0,
            scrollY: 0,
            ignoreElements: el =>
              el.classList.contains('toolbar')         ||
              el.classList.contains('action-bar')      ||
              el.classList.contains('section-toggle-hint') ||
              el.id === 'action-bar'                   ||
              el.id === 'save-status'                  ||
              el.classList.contains('theme-toggle-btn'),
            onclone: function (clonedDoc) {
              // html2canvas paints <input type="date"> segments year-first on
              // Safari ("2026 06 21"). Replace it in the CLONE only with a span
              // showing the nicely formatted value, styled to match the input.
              try {
                var _live = document.getElementById('date');
                var _cd   = clonedDoc.getElementById('date');
                if (_live && _cd && _live.value) {
                  var _cs = window.getComputedStyle(_live);
                  var _sp = clonedDoc.createElement('span');
                  _sp.textContent = _fmtCaptureDate(_live.value);
                  ['fontFamily','fontSize','fontWeight','fontStyle','letterSpacing',
                   'color','lineHeight','textAlign','paddingTop','paddingRight',
                   'paddingBottom','paddingLeft','borderBottomStyle','borderBottomWidth',
                   'borderBottomColor','height','minHeight','width','minWidth',
                   'boxSizing','flexGrow','flexShrink','flexBasis'
                  ].forEach(function (p) { try { _sp.style[p] = _cs[p]; } catch (e) {} });
                  _sp.style.display    = 'inline-flex';
                  _sp.style.alignItems = 'center';
                  _sp.style.whiteSpace = 'nowrap';
                  _sp.style.overflow   = 'hidden';
                  if (_cd.parentNode) _cd.parentNode.replaceChild(_sp, _cd);
                }
              } catch (e) {}
            }
          }).then(srcCanvas => {
            restoreCapture();

            // ── Trim trailing white from the BOTTOM of the capture. ──
            // We intentionally captured ~400px too tall so the form can never
            // clip; that surplus is plain white. Scan the canvas from the bottom
            // up for the last row that contains real (non-white) content, then
            // crop just below it. This works entirely in CANVAS pixels, so the
            // device pixel ratio never enters the math — it's DPR-proof.
            try {
              var _tctx = srcCanvas.getContext('2d', { willReadFrequently: true });
              var _W = srcCanvas.width, _H = srcCanvas.height;
              // Treat near-white as white (JPEG/anti-alias specks aren't content).
              var _WHITE = 250;
              var _lastContentRow = -1;
              // Coarse scan upward in 4px steps for speed on tall canvases…
              outer:
              for (var _y = _H - 1; _y >= 0; _y -= 4) {
                var _row = _tctx.getImageData(0, _y, _W, 1).data;
                // …sampling every 8th pixel across the row.
                for (var _x = 0; _x < _W; _x += 8) {
                  var _i = _x * 4;
                  if (_row[_i] < _WHITE || _row[_i + 1] < _WHITE || _row[_i + 2] < _WHITE) {
                    _lastContentRow = _y;
                    break outer;
                  }
                }
              }
              if (_lastContentRow >= 0) {
                // Refine within the 4px coarse band to land on the exact last row.
                for (var _ry = Math.min(_H - 1, _lastContentRow + 4); _ry > _lastContentRow; _ry--) {
                  var _rrow = _tctx.getImageData(0, _ry, _W, 1).data;
                  var _hit = false;
                  for (var _rx = 0; _rx < _W; _rx += 8) {
                    var _ri = _rx * 4;
                    if (_rrow[_ri] < _WHITE || _rrow[_ri + 1] < _WHITE || _rrow[_ri + 2] < _WHITE) { _hit = true; break; }
                  }
                  if (_hit) { _lastContentRow = _ry; break; }
                }
                // Keep a small white margin below the content (scaled to capture).
                var _cropH = Math.min(_H, _lastContentRow + 1 + 24);
                if (_cropH < _H) {
                  var _trimmed = document.createElement('canvas');
                  _trimmed.width  = _W;
                  _trimmed.height = _cropH;
                  var _trctx = _trimmed.getContext('2d');
                  _trctx.fillStyle = '#ffffff';
                  _trctx.fillRect(0, 0, _W, _cropH);
                  _trctx.drawImage(srcCanvas, 0, 0, _W, _cropH, 0, 0, _W, _cropH);
                  srcCanvas = _trimmed;
                }
              }
            } catch (e) { /* if pixel read fails, fall back to the untrimmed canvas */ }

            // Pad to a TRUE 8.5x11 letter canvas so the image is always portrait
            // and prints with no fit-to-page over-scaling/clipping. Content fills
            // the full width within thin margins (edge-to-edge, no side gutters).
            const LETTER_W = 1632;
            const LETTER_H = Math.round(LETTER_W * 11 / 8.5); // 2112
            const MARGIN_X = Math.round(LETTER_W * 0.15 / 8.5); // sides ~29px
            const MARGIN_Y = Math.round(LETTER_W * 0.15 / 8.5); // top/bottom ~29px
            const availW   = LETTER_W - MARGIN_X * 2;
            const availH   = LETTER_H - MARGIN_Y * 2;
            // Fill the FULL available width edge-to-edge (no side gutters). This
            // is the actual fix — the old logic fit-by-height and left white
            // gutters on the sides. For height, fill the sheet to match the
            // target's edge-to-edge look, but cap how far we stretch beyond the
            // content's natural (proportional) height so the short collapsed
            // view never looks vertically warped.
            const drawW = availW;
            const propH = Math.round(srcCanvas.height * (availW / srcCanvas.width)); // proportional height at full width
            // On mobile, fill the sheet vertically edge-to-edge (use the full
            // available height) so the captured image isn't short with trailing
            // white space. Desktop keeps the gentle +6% cap to avoid warping the
            // short collapsed view.
            // Draw proportionally on EVERY device — fill the full width, and let
            // height follow naturally. Previously mobile stretched content to the
            // full sheet height (availH), which (a) distorted the aspect ratio and
            // (b) magnified any bottom clipping, making captures look different on
            // every device. Proportional + top-aligned is consistent everywhere.
            // Never exceed availH so tall forms can't overflow the sheet.
            const drawH = Math.min(availH, propH);
            const letterCanvas = document.createElement('canvas');
            letterCanvas.width  = LETTER_W;
            letterCanvas.height = LETTER_H;
            const ctx = letterCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, LETTER_W, LETTER_H);
            ctx.drawImage(srcCanvas, 0, 0, srcCanvas.width, srcCanvas.height, MARGIN_X, MARGIN_Y, drawW, drawH);
            resolve(letterCanvas);
          }).catch(err => {
            restoreCapture();
            reject(err);
          });
        });
      });
    }

    // Pre-fetch the logo as a data URL so the canvas is never tainted
    // by a cross-origin resource (fixes macOS Safari SecurityError).
    // Falls back to hiding the logo if fetch fails for any reason.
    if (logoImg && logoOrigSrc) {
      fetch(logoOrigSrc)
        .then(r => r.blob())
        .then(blob => new Promise((res, rej) => {
          const fr = new FileReader();
          fr.onload  = () => res(fr.result);
          fr.onerror = rej;
          fr.readAsDataURL(blob);
        }))
        .then(dataUrl => {
          logoImg.src = dataUrl;       // inline data URL — no CORS issue
          setTimeout(doCapture, 150);  // brief delay for img repaint
        })
        .catch(() => {
          logoImg.style.visibility = 'hidden'; // hide if fetch fails
          doCapture();
        });
    } else {
      doCapture();
    }
  });
}

// ===== SMART CAPTURE =====
// One button for all devices. Prefer the native Share Sheet (works on iOS and
// modern Android Chrome) — it lets the user Save to Photos/Gallery, AirDrop,
// email, message, Drive, etc. in one tap. If the browser can't share files, we
// fall back to a direct download (Android/desktop) or the long-press overlay
// (older iOS), reusing this form's existing capture pipeline.
function isIOSDevice() {
  var ua = navigator.userAgent || '';
  var iOS = /iPad|iPhone|iPod/.test(ua);
  // iPadOS 13+ reports as Mac; detect by touch points on a Mac-like UA.
  var iPadOS = (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  return iOS || iPadOS;
}
// Can this browser share files at all?
function canShareFiles() {
  try {
    if (!navigator.canShare) return false;
    var probe = new File(['x'], 'probe.jpg', { type: 'image/jpeg' });
    return navigator.canShare({ files: [probe] });
  } catch (e) { return false; }
}
function buildReportFilename() {
  var nm = (document.getElementById('name')    && document.getElementById('name').value    || '').trim();
  var ad = (document.getElementById('address') && document.getElementById('address').value || '').trim();
  var base = [nm, ad, 'Maintenance Report'].filter(Boolean).join(' ')
               .replace(/[\/\\:*?"<>|]+/g, '').replace(/\s+/g, '_').slice(0, 120);
  return (base || 'AOG_Maintenance_Report') + '.jpg';
}
function saveSmart() {
  if (canShareFiles())      captureAndShare();   // native Share Sheet (iOS + modern Android)
  else if (isIOSDevice())   saveForIPhone();     // older iOS → long-press overlay
  else                      saveForAndroid();    // Android/desktop → download
}

function captureAndShare() {
  setStatus('Rendering... please wait');
  var wasDark = document.body.classList.contains('dark-mode');
  if (wasDark) document.body.classList.remove('dark-mode');

  setTimeout(function () {
    capturePageToCanvas().then(function (canvas) {
      var dataURL = canvas.toDataURL('image/jpeg', 0.92);
      var fname   = buildReportFilename();
      var file;
      try {
        var parts = dataURL.split(',');
        var mime  = parts[0].match(/:(.*?);/)[1];
        var bin   = atob(parts[1]);
        var arr   = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        file = new File([arr], fname, { type: mime });
      } catch (e) { file = null; }
      if (wasDark) document.body.classList.add('dark-mode');

      // Share ONLY the file — no title/text. A title makes iOS write a stray
      // .txt file when the user picks "Save to Files".
      if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] }).then(function () {
          setStatus('');
        }).catch(function (err) {
          if (err && err.name === 'AbortError') { setStatus(''); }      // user dismissed
          else if (isIOSDevice()) { saveForIPhone(); }                  // fall back
          else { saveForAndroid(); }
        });
      } else {
        if (isIOSDevice()) saveForIPhone(); else saveForAndroid();
      }
    }).catch(function () {
      if (wasDark) document.body.classList.add('dark-mode');
      setStatus('Render failed. Try the PDF button instead.');
    });
  }, 250);
}

function saveForIPhone() {
  setStatus('Rendering... please wait');
  const wasDark = document.body.classList.contains('dark-mode');
  if (wasDark) document.body.classList.remove('dark-mode');

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:999999;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:0;overflow-y:auto;-webkit-overflow-scrolling:touch;box-sizing:border-box;';

  const closeBtn = document.createElement('button');
  closeBtn.style.cssText = 'position:sticky;top:60px;background:#DC2626;color:#fff;border:none;border-radius:6px;padding:12px 28px;font-size:15px;cursor:pointer;font-weight:bold;z-index:1000000;align-self:center;margin-top:60px;margin-bottom:12px;';
  closeBtn.textContent = 'X Close';

  const lbl = document.createElement('div');
  lbl.style.cssText = 'color:#ccc;font-size:13px;margin:8px 0;text-align:center;line-height:1.6;padding:0 12px;flex-shrink:0;';
  lbl.textContent = 'Rendering your form...';

  const img = document.createElement('img');
  img.style.cssText = 'width:100%;display:block;border:none;';
  var _nmI = (document.getElementById('name')    && document.getElementById('name').value    || '').trim();
  var _adI = (document.getElementById('address') && document.getElementById('address').value || '').trim();
  img.alt = [_nmI, _adI, 'Maintenance Report'].filter(Boolean).join(' ');

  overlay.appendChild(closeBtn);
  overlay.appendChild(lbl);
  overlay.appendChild(img);
  document.body.appendChild(overlay);

  closeBtn.onclick = () => {
    document.body.removeChild(overlay);
    if (wasDark) document.body.classList.add('dark-mode');
    setStatus('');
  };

  setTimeout(() => {
    capturePageToCanvas().then(canvas => {
      try {
        img.src = canvas.toDataURL('image/jpeg', 0.92);
        lbl.innerHTML = '<b>Long-press the image below</b><br>then tap "Add to Photos"';
        lbl.style.color = '#4ade80';
        setStatus('Ready - long-press image to save.');
      } catch (e) {
        lbl.textContent = 'Security error rendering image. Try the PDF button instead.';
        lbl.style.color = '#f87171';
        setStatus('Render failed.');
      }
      if (wasDark) document.body.classList.add('dark-mode');
    }).catch(() => {
      lbl.textContent = 'Render failed. Try the PDF button instead.';
      lbl.style.color = '#f87171';
      setStatus('Render failed.');
      if (wasDark) document.body.classList.add('dark-mode');
    });
  }, 250);
}

function saveForAndroid() {
  setStatus('Rendering... please wait');
  const wasDark = document.body.classList.contains('dark-mode');
  if (wasDark) document.body.classList.remove('dark-mode');
  setTimeout(() => {
    capturePageToCanvas().then(canvas => {
      try {
        const _nm = (document.getElementById('name')    && document.getElementById('name').value    || '').trim();
        const _ad = (document.getElementById('address') && document.getElementById('address').value || '').trim();
        const _base = [_nm, _ad, 'Maintenance Report'].filter(Boolean).join(' ')
                        .replace(/[\/\\:*?"<>|]+/g, '').replace(/\s+/g, '_').slice(0, 120);
        const link = document.createElement('a');
        link.download = (_base || 'AOG_Maintenance_Report') + '.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.92);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setStatus('Saved to Downloads folder.');
        setTimeout(() => setStatus(''), 4000);
      } catch (e) {
        setStatus('Security error. Try PDF instead.');
      }
      if (wasDark) document.body.classList.add('dark-mode');
    }).catch(() => {
      setStatus('Render failed. Try PDF instead.');
      if (wasDark) document.body.classList.add('dark-mode');
    });
  }, 250);
}

setInterval(saveDraft, 30000);
document.addEventListener('change', saveDraft);
// Debounce the per-keystroke save: walking every field + writing storage on
// every input event adds main-thread work that compounds scroll/typing jank.
var _saveTimer;
document.addEventListener('input', function () {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveDraft, 600);
});

document.addEventListener('DOMContentLoaded', function () {
  const todayInput = document.getElementById('date');
  if (todayInput && !todayInput.value) {
    todayInput.value = new Date().toISOString().split('T')[0];
  }
  applyTheme(getInitialTheme());
  setupThemeToggle();
  restoreDraft();
  setupSimToggle();
});

function setupSimToggle() {
  var header    = document.getElementById('sim-header');
  var hdrText   = document.getElementById('sim-header-text');
  var full      = document.getElementById('sim-body-full');
  var collapsed = document.getElementById('sim-body-collapsed');
  if (!header || !full || !collapsed) return;
  var KEY = 'aog_sim_view';

  function apply(view) {
    if (view === 'collapsed') {
      full.classList.add('sim-hidden');
      collapsed.classList.remove('sim-hidden');
    } else {
      full.classList.remove('sim-hidden');
      collapsed.classList.add('sim-hidden');
    }
    hdrText.textContent = 'Simulated Power Test';
    try { localStorage.setItem(KEY, view); } catch (e) {}
  }

  var saved = 'full';
  try { saved = localStorage.getItem(KEY) || 'full'; } catch (e) {}
  apply(saved);

  function toggle() {
    apply(collapsed.classList.contains('sim-hidden') ? 'collapsed' : 'full');
  }
  header.addEventListener('click', toggle);
  header.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });

  // If the user answers "Yes" to whether the test was performed, jump to the
  // full form so they can fill it out.
  var yesRadio = document.getElementById('simperf_y');
  if (yesRadio) {
    yesRadio.addEventListener('change', function () {
      if (yesRadio.checked) {
        apply('full');
        yesRadio.checked = false;
        if (typeof saveDraft === 'function') saveDraft();
      }
    });
  }
}

if ('serviceWorker' in navigator) {
  // Auto-reload once when a newly activated service worker takes control, so a
  // freshly deployed version replaces a stale cached one without manual cache
  // clearing. Guarded so it can only fire a single reload (no loops).
  var _swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    if (_swRefreshing) return;
    _swRefreshing = true;
    window.location.reload();
  });

  window.addEventListener('load', function () {
    navigator.serviceWorker.register('../sw.js', { scope: '../' })
      .then(function (reg) {
        console.log('[SW] Registered, scope:', reg.scope);
        // Check for a newer service worker on every load.
        reg.update();
        // If one is already waiting, ask it to activate immediately (works if
        // sw.js calls self.skipWaiting() on the SKIP_WAITING message).
        function _nudge(sw) { if (sw) { try { sw.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {} } }
        if (reg.waiting) _nudge(reg.waiting);
        reg.addEventListener('updatefound', function () {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function () {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) _nudge(reg.waiting);
          });
        });
      })
      .catch(function (err) { console.warn('[SW] Registration failed:', err); });
  });
}
</script>
<script>
function adjustTopPadding() {
  const bar    = document.getElementById('action-bar');
  const page   = document.getElementById('page');
  const status = document.getElementById('save-status');
  if (bar && page)   page.style.paddingTop = bar.offsetHeight + 'px';
  if (bar && status) status.style.top      = bar.offsetHeight + 'px';
}
window.addEventListener('resize', adjustTopPadding);
window.addEventListener('orientationchange', adjustTopPadding);
window.addEventListener('load',   adjustTopPadding);
// Re-measure after first paint and after fonts settle so the bar's final
// height is captured (otherwise the page can sit a few px under/over the bar).
document.addEventListener('DOMContentLoaded', adjustTopPadding);
setTimeout(adjustTopPadding, 100);
setTimeout(adjustTopPadding, 500);
if (document.fonts && document.fonts.ready) { document.fonts.ready.then(adjustTopPadding); }
</script>
