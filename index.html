<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  color-scheme: light;
  --cyan: #D35E13;
  --cyan-dim: #D35E13;
  --amber: #D35E13;
  --bg: #FFFFFF;
  --bg3: #F8F8F8;
  --bg4: #F0F0F0;
  --panel: #FFFFFF;
  --border: rgba(211,94,19,0.25);
  --border-bright: rgba(211,94,19,0.5);
  --text: #1F2937;
  --text-muted: #6B7280;
  --text-dim: #9CA3AF;
  --glow: 0 0 8px rgba(211,94,19,0.3), 0 0 20px rgba(211,94,19,0.1);
  --font-display: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Exo 2', sans-serif;
  --icon-color-primary: #D35E13;
}

body.dark-mode {
  color-scheme: dark;
  --bg: #0A0E27;
  --bg3: #1A2847;
  --bg4: #243458;
  --panel: #0F1535;
  --border: rgba(0,255,200,0.08);
  --border-bright: rgba(0,255,200,0.25);
  --text: #E0F7FF;
  --text-muted: #7DD3FC;
  --text-dim: #38BDF8;
  --cyan: #00FFC8;
  --cyan-dim: #06B6D4;
  --amber: #D35E13;
  --icon-color-primary: #00FFC8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* Base type scale — widened sheet. Matches the 8.5x11 capture/print pipeline
   (19px) so the on-screen working view = what gets captured. Mobile (<=600px)
   and print media queries below still override this with their own sizes. */
html { font-size: 19px; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  width: 100%;
  margin: 0 auto;
  padding: 0;
  padding-bottom: max(0px, env(safe-area-inset-bottom, 0px));
  scroll-padding-top: calc(48px + env(safe-area-inset-top, 0px));
  -webkit-text-size-adjust: 100%;
  overflow-x: clip;
  transition: background-color 0.3s ease, color 0.3s ease;
  min-height: -webkit-fill-available;
  min-height: 100vh;
}

/* iPadOS Safari scroll fix (screen only): the body's -webkit-fill-available
   min-height pins the body to the viewport, so with the fixed action bar the
   page can't grow past the screen and won't scroll (it just rubber-bands).
   Let the body take its natural content height so normal document scrolling
   works. Scoped to screen via :not within @media print elsewhere — these are
   base (non-print) rules, and the print block re-sets height anyway. */
html.ipad, html.ipad body {
  min-height: 0;
  height: auto;
  -webkit-overflow-scrolling: touch;
}
html.ipad .page {
  min-height: 0;
  height: auto;
}
/* iPadOS compositor stability: fast scrolling desyncs the fixed dark gradient
   layer from the scrolling page, making borders appear to "stick" while the
   page rubber-bands. Pin the gradient to its own GPU layer and keep the action
   bar on one too so they don't fight the scroll layer. */
/* iPadOS fix for "sticking" borders: a position:fixed full-viewport layer
   (body.dark-mode::before) desyncs from the scrolling page during fast scroll,
   so the page border appears to stick while content rubber-bands. On iPad,
   kill that fixed layer and paint the gradient directly on the (scrolling)
   body instead — one layer, nothing to desync. */
html.ipad body.dark-mode::before { display: none !important; content: none !important; }
html.ipad body.dark-mode {
  background: linear-gradient(135deg,#0A0E27 0%,#0F1535 25%,#0A1628 50%,#0F1535 75%,#0A0E27 100%) !important;
  background-attachment: scroll !important;
}

/* Gradient painted directly on the (scrolling) body — no fixed layer.
   A position:fixed full-viewport background must be re-composited on every
   scroll frame in WebKit (desktop app + iPad webview), which is the main
   cause of the scroll freezing/stutter. Painting it on the body scrolls
   with the content as one layer — nothing to desync or re-composite. */
body.dark-mode {
  background: linear-gradient(135deg,#0A0E27 0%,#0F1535 25%,#0A1628 50%,#0F1535 75%,#0A0E27 100%);
  background-attachment: scroll;
}
body.dark-mode::before { content: none; display: none; }

.page {
  width: 100%;
  max-width: 1000px;
  margin: 0 auto;
  background: var(--panel);
  border: 2px solid var(--cyan);
  box-shadow: 0 0 0 1px rgba(211,94,19,0.15);
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: -webkit-fill-available;
  min-height: auto;
  padding: 0;
  box-sizing: border-box;
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
  flex-shrink: 0;
  overflow-x: clip;
}

body.dark-mode .page {
  background: linear-gradient(135deg,rgba(15,21,53,0.95) 0%,rgba(10,14,39,0.98) 100%);
  border-color: #00FFC8;
  box-shadow: 0 0 0 1px rgba(0,255,200,0.35);
}

.page::before, .page::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-color: var(--cyan);
  border-style: solid;
  z-index: 10;
  pointer-events: none;
}
.page::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.page::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.page-corner-bl, .page-corner-br {
  position: absolute;
  width: 12px; height: 12px;
  border-color: var(--cyan);
  border-style: solid;
  z-index: 10;
  pointer-events: none;
}
.page-corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.page-corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

@media (max-width: 768px) {
  body { padding: 0; }
  .page { box-shadow: none; border: none; max-width: 100%; }
  .page::before, .page::after, .page-corner-bl, .page-corner-br { display: none; }
  .header { flex-wrap: nowrap; gap: 6px; padding: 6px 8px; min-height: auto; justify-content: space-between; }
  .header-logo { flex: 0 1 auto; min-width: 0; overflow: hidden; padding-left: 30px; }
  .logo-img { width: 36px; height: 36px; }
  .company-name { font-size: 0.75rem !important; letter-spacing: 0.5px !important; white-space: nowrap; }
  .doc-title { font-size: 0.75rem !important; letter-spacing: 1px !important; white-space: nowrap; }
}

/* ── HEADER ── */
.header {
  background: var(--panel);
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  border-bottom: 1px solid var(--border-bright);
  position: relative;
  overflow: hidden;
  min-height: 56px;
  page-break-after: avoid;
  break-after: avoid;
  margin: 0;
  flex-shrink: 0;
  transition: all 0.3s ease;
  width: 100%;
  box-sizing: border-box;
}

body.dark-mode .header {
  background: linear-gradient(90deg,rgba(15,21,53,0.9) 0%,rgba(26,40,71,0.8) 50%,rgba(15,21,53,0.9) 100%);
  border-bottom-color: rgba(0,255,200,0.25);
  box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,200,0.08), inset 0 1px 0 rgba(0,255,200,0.1);
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--amber), var(--cyan), transparent);
}

body.dark-mode .header::after {
  background: linear-gradient(90deg, transparent, #00FFC8, #3B82F6, #00FFC8, transparent);
  opacity: 0.6;
}

.header-logo { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

.logo-img {
  width: 42px; height: 42px;
  flex-shrink: 0;
  object-fit: contain;
  filter: drop-shadow(0 0 12px rgba(211,94,19,0.6)) drop-shadow(0 0 24px rgba(211,94,19,0.4)) brightness(1.1);
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 12px rgba(211,94,19,0.6)) drop-shadow(0 0 24px rgba(211,94,19,0.4)) brightness(1.1); }
  50%     { filter: drop-shadow(0 0 18px rgba(211,94,19,0.8)) drop-shadow(0 0 36px rgba(211,94,19,0.6)) brightness(1.2); }
}
body.dark-mode .logo-img {
  filter: drop-shadow(0 0 12px rgba(0,255,200,0.6)) drop-shadow(0 0 24px rgba(0,255,200,0.4)) brightness(1.1);
  animation: logoPulseDark 3s ease-in-out infinite;
}
@keyframes logoPulseDark {
  0%,100% { filter: drop-shadow(0 0 12px rgba(0,255,200,0.6)) drop-shadow(0 0 24px rgba(0,255,200,0.4)) brightness(1.1); }
  50%     { filter: drop-shadow(0 0 18px rgba(0,255,200,0.8)) drop-shadow(0 0 36px rgba(0,255,200,0.6)) brightness(1.2); }
}

.company-name {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--cyan);
  letter-spacing: 2px;
  line-height: 1.1;
  text-shadow: 0 0 12px rgba(211,94,19,0.2);
  font-weight: 700;
  transition: all 0.3s ease;
}
body.dark-mode .company-name {
  color: #00FFC8;
  text-shadow: 0 0 10px #00FFC8, 0 0 20px rgba(0,255,200,0.5), 0 0 30px rgba(59,130,246,0.3), 0 0 40px rgba(0,255,200,0.2);
  letter-spacing: 3px;
}

.doc-title {
  font-family: var(--font-display);
  font-size: 0.9rem;
  color: var(--amber);
  letter-spacing: 3px;
  text-shadow: 0 0 12px rgba(211,94,19,0.2);
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.3s ease;
}
body.dark-mode .doc-title {
  color: #00FFC8 !important;
  text-shadow: 0 0 12px #00FFC8, 0 0 20px rgba(0,255,200,0.5), 0 0 30px rgba(0,255,200,0.3) !important;
  letter-spacing: 4px;
}

/* ── THEME TOGGLE ── */
.theme-toggle-btn {
  position: relative;
  width: 36px; height: 36px;
  padding: 5px;
  border: 1px solid rgba(211,94,19,0.4);
  background: rgba(211,94,19,0.05);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cyan);
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  flex-shrink: 0;
  z-index: 100;
}
body.dark-mode .theme-toggle-btn { background: rgba(0,255,200,0.08); border-color: rgba(0,255,200,0.2); color: #00FFC8; }
.theme-toggle-btn:hover { border-color: var(--cyan); background: rgba(211,94,19,0.1); box-shadow: var(--glow); transform: scale(1.08); }
body.dark-mode .theme-toggle-btn:hover { background: rgba(0,255,200,0.12); border-color: #00FFC8; box-shadow: 0 0 12px rgba(0,255,200,0.3), inset 0 0 8px rgba(0,255,200,0.05); transform: scale(1.1); }
.theme-toggle-btn:active { transform: scale(0.95); }

.theme-icon {
  width: 16px; height: 16px;
  transition: all 0.3s ease;
  position: absolute;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke: var(--icon-color-primary) !important;
  color: var(--icon-color-primary) !important;
}
.theme-icon.theme-icon-moon { opacity: 0; }
body.dark-mode .theme-icon { opacity: 0; transform: rotate(-180deg); }
body.dark-mode .theme-icon.theme-icon-moon { opacity: 1; transform: rotate(0deg); }

/* ── TOOLBAR ── */
.toolbar { display: none !important; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 5px 10px;
  border: 1px solid rgba(211,94,19,0.4);
  background: rgba(211,94,19,0.05);
  font-family: var(--font-display);
  font-size: 0.63rem;
  font-weight: 500;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--cyan);
  white-space: nowrap;
  min-height: 30px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.15s;
  clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
  position: relative;
  overflow: hidden;
}
body.dark-mode .btn { background: rgba(0,255,200,0.08); border-color: rgba(0,255,200,0.25); color: #00FFC8; text-shadow: 0 0 4px rgba(0,255,200,0.3); }
.btn:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: var(--glow); }
body.dark-mode .btn:hover { background: rgba(0,255,200,0.12); border-color: #00FFC8; box-shadow: 0 0 12px rgba(0,255,200,0.25), inset 0 0 12px rgba(0,255,200,0.05); text-shadow: 0 0 8px rgba(0,255,200,0.6); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── CONTENT ── */
.content {
  padding: 3px;
  display: flex;
  flex-direction: column;
  flex: 1;
  width: 100%;
  box-sizing: border-box;
  min-height: 0;
  overflow-y: visible;
}
@media (max-width: 480px) { .content { padding: 3px; } }

@media (max-width: 400px) {
  .ts-row { flex-direction: column !important; align-items: flex-start !important; gap: 4px !important; }
  .ts-row > label[for^="tsserial"] { width: 100% !important; }
  .ts-row > input[id^="tsserial"] { width: 100% !important; max-width: 100% !important; flex: 1 1 100% !important; box-sizing: border-box !important; }
  .ts-row > div { width: 100% !important; }
  .ts-row .check-group { width: 100% !important; }
  /* Collapsed "Was simulation power test performed?" — let the long label
     wrap and keep the Y/N group fully on screen instead of overflowing. */
  #sim-body-collapsed .test-item { flex-wrap: wrap !important; align-items: flex-start !important; }
  #sim-body-collapsed .test-item > label { min-width: 0 !important; width: 100% !important; white-space: normal !important; }
  #sim-body-collapsed .test-item .yn-group { margin-right: 0 !important; }
}

/* Mobile: Customer & Job Info — each label+input pair on its own line */
@media screen and (max-width: 600px) {
  /* Make everything bigger on mobile screen (rem-based text scales from this) */
  html { font-size: 19px !important; }
  #cust-info-body .field-row,
  #cust-info-body .field-row-nowrap {
    flex-wrap: wrap !important; row-gap: 4px !important; column-gap: 6px !important;
  }
  #cust-info-body .field-row label {
    flex: 0 0 70px !important; width: 70px !important; text-align: left !important; margin: 0 !important;
  }
  #cust-info-body .field-row input,
  #cust-info-body .field-row select {
    flex: 1 1 calc(100% - 80px) !important; width: auto !important;
    min-width: 0 !important; max-width: none !important;
  }
  /* Override the inline widths on Tech/Model/Serial/Hrs and the date cap */
  #cust-info-body #tech, #cust-info-body #model, #cust-info-body #serial,
  #cust-info-body #hours, #cust-info-body #date, #cust-info-body #name,
  #cust-info-body #number {
    width: auto !important; max-width: none !important; flex: 1 1 calc(100% - 80px) !important;
  }
  /* Model / Serial # / Hrs each get their own full-width row on mobile so
     the inputs are wide enough to tap and type into. (screen only — print unaffected) */
  #model-serial-hrs-row {
    flex-wrap: wrap !important;
    gap: 6px !important;
  }
  #model-serial-hrs-row > span {
    flex: 1 1 100% !important;
    min-width: 0 !important;
    width: 100% !important;
  }
  #model-serial-hrs-row > span > input {
    flex: 1 1 0 !important;
    width: auto !important;
    min-width: 0 !important;
  }
}

/* ── SECTIONS ── */
.section {
  border: 1px solid var(--border);
  margin-bottom: 4px;
  background: var(--panel);
  position: relative;
  transition: all 0.3s ease;
  page-break-inside: avoid;
  break-inside: avoid;
}
body.dark-mode .section {
  background: linear-gradient(135deg,rgba(26,40,71,0.6) 0%,rgba(15,21,53,0.8) 100%);
  border-color: rgba(0,255,200,0.15);
  box-shadow: 0 0 1px rgba(0,255,200,0.1);
}
.section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--cyan), transparent 60%);
  transition: all 0.3s ease;
}
body.dark-mode .section::before {
  background: linear-gradient(90deg, #00FFC8, rgba(0,255,200,0.3) 40%, transparent 100%);
  opacity: 0.7;
}

.section-header {
  background: var(--bg3);
  color: var(--cyan);
  font-family: var(--font-display);
  font-size: 0.68rem;
  letter-spacing: 2.5px;
  padding: 3px 10px;
  border-bottom: 1px solid var(--border);
  text-shadow: 0 0 6px rgba(211,94,19,0.15);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s ease;
  text-transform: uppercase;
}
body.dark-mode .section-header {
  background: linear-gradient(90deg,rgba(26,40,71,0.8) 0%,rgba(36,52,88,0.6) 100%);
  color: #00FFC8;
  border-bottom-color: rgba(0,255,200,0.2);
  text-shadow: 0 0 8px rgba(0,255,200,0.4), 0 0 16px rgba(59,130,246,0.15);
}
.section-header::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--cyan);
  box-shadow: 0 0 4px var(--cyan);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
  transition: all 0.3s ease;
}
body.dark-mode .section-header::before { background: #00FFC8; box-shadow: 0 0 6px #00FFC8, 0 0 12px rgba(0,255,200,0.5); }
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.section-body { padding: 4px 8px; transition: all 0.3s ease; }
.section-body.sim-hidden { display: none !important; }
@media print { .section-body.sim-hidden { display: none !important; } }

.section-header-toggle { cursor: pointer; user-select: none; -webkit-user-select: none; }
.section-header-toggle .section-toggle-hint { margin-left: auto; }
.section-header-toggle:hover { background: var(--bg4); }
body.dark-mode .section-header-toggle:hover { background: linear-gradient(90deg,rgba(36,52,88,0.9) 0%,rgba(46,62,98,0.7) 100%); }
.section-toggle-hint {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 1px;
  padding: 1px 6px;
  border: 1px solid var(--border-bright);
  border-radius: 3px;
  color: var(--text-muted);
  text-shadow: none;
  flex-shrink: 0;
}
body.dark-mode .section-toggle-hint { color: #7DD3FC; border-color: rgba(0,255,200,0.3); }
@media print { .section-toggle-hint { display: none !important; } }

/* ── TWO-COLUMN ── */
.two-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  width: 100%;
  margin-bottom: 4px;
}
.two-column .section { margin-bottom: 0; }
/* Left column can stack two sections (Battery + Oil & Filters) beside the taller
   Generator column, reclaiming the dead space under Battery. */
.col-stack { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
@media print { .col-stack { gap: 2px !important; } }
@media (max-width: 820px) {
  .two-column { grid-template-columns: 1fr; gap: 4px; margin-bottom: 4px; }
  /* iPad (incl. 768px portrait) is wide enough for the two-up split — keep
     Battery/Generator side-by-side instead of collapsing like a phone. */
  html.ipad .two-column { grid-template-columns: 1fr 1fr !important; }
}

/* ── FIELD ROWS ── */
.field-row {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}
.field-row:last-child { margin-bottom: 0; }

/* Each label+control unit lays out identically (fixes the Other row where the
   Signal % group looked misaligned/"pasted in" vs the boxed Y/N groups). */
.field-group { display: flex; align-items: center; gap: 5px; }
#other-section .field-row { gap: 18px; align-items: center; flex-wrap: wrap; }
#other-section .field-group { flex: 0 0 auto; }
#other-section #signal { width: 44px; }

label {
  font-size: 0.58rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
  line-height: 1;
  font-family: var(--font-display);
  transition: color 0.3s ease;
}
body.dark-mode label { color: #7DD3FC; }

/* ── INPUTS ── */
input[type="text"],
input[type="email"],
input[type="tel"],
input[type="date"],
input[type="number"],
textarea,
select {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text);
  background: var(--panel);
  border: none;
  border-bottom: 1.5px solid rgba(211,94,19,0.25);
  padding: 2px 4px;
  outline: none;
  width: 100%;
  transition: all 0.2s;
  border-radius: 0;
  min-height: 28px;
  -webkit-appearance: none;
  appearance: none;
  caret-color: var(--cyan);
}
body.dark-mode input[type="text"],
body.dark-mode input[type="email"],
body.dark-mode input[type="tel"],
body.dark-mode input[type="date"],
body.dark-mode input[type="number"],
body.dark-mode textarea,
body.dark-mode select {
  background: rgba(10,14,39,0.6);
  border-bottom-color: rgba(0,255,200,0.2);
  color: #E0F7FF;
  caret-color: #00FFC8;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,255,200,0.05);
}
input[type="date"] { min-height: 28px; padding: 2px 3px; cursor: pointer; color-scheme: light; text-align: left; }
input[type="date"]::-webkit-datetime-edit { text-align: left; }
input[type="date"]::-webkit-date-and-time-value { text-align: left; }
body.dark-mode input[type="date"] { color-scheme: dark; }
input::placeholder, textarea::placeholder { color: var(--text-dim) !important; opacity: 0.4; font-size: 0.73rem; }

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus,
input[type="date"]:focus,
input[type="number"]:focus,
textarea:focus,
select:focus {
  border-bottom-color: var(--cyan);
  background: rgba(211,94,19,0.04);
  box-shadow: 0 1px 0 0 rgba(211,94,19,0.3), 0 0 8px rgba(211,94,19,0.08);
}
body.dark-mode input[type="text"]:focus,
body.dark-mode input[type="email"]:focus,
body.dark-mode input[type="tel"]:focus,
body.dark-mode input[type="date"]:focus,
body.dark-mode input[type="number"]:focus,
body.dark-mode textarea:focus,
body.dark-mode select:focus {
  border-bottom-color: #00FFC8;
  background: rgba(26,40,71,0.8);
  box-shadow: inset 0 0 8px rgba(0,255,200,0.1), 0 0 8px rgba(0,255,200,0.15), 0 0 16px rgba(59,130,246,0.08);
}

input.short { width: 48px; min-width: 48px; flex-shrink: 0; }
input.med   { width: 80px; flex: 0 0 auto; }
input.long  { flex: 1; min-width: 70px; }
/* Exercise Schedule: ~10 characters wide on screen */
/* Exercise Schedule, Generator Voltage, Voltage During Simulation:
   widened ~5 characters, on screen and in all prints. */
#exercisetime { width: 20ch !important; min-width: 20ch !important; flex: 0 0 auto !important; }
#genvolt, #simvolt { width: 12ch !important; min-width: 12ch !important; flex: 0 0 auto !important; }
/* Name/Job/Date row: Name fills half the page, Job# and Date split the rest
   (larger screens only — on mobile each field stacks on its own line). */
@media screen and (min-width: 601px) {
  #name-job-date-row #name   { flex: 2 1 0 !important; width: auto !important; min-width: 0 !important; }
  #name-job-date-row #number { flex: 1 1 0 !important; width: auto !important; min-width: 0 !important; }
  #name-job-date-row #date   { flex: 1 1 0 !important; width: auto !important; min-width: 0 !important; }
}

textarea {
  width: 100%;
  resize: vertical;
  border: 1px solid rgba(211,94,19,0.15);
  padding: 2px 3px;
  margin-top: 1px;
  min-height: auto !important;
  max-height: none !important;
  background: var(--panel);
  color: var(--text);
  transition: all 0.3s ease;
  font-size: 0.73rem;
  line-height: 1.2;
}
body.dark-mode textarea { background: rgba(10,14,39,0.6); border-color: rgba(0,255,200,0.1); color: #E0F7FF; }
textarea:focus { border-color: var(--cyan); box-shadow: 0 0 6px rgba(211,94,19,0.1); }
body.dark-mode textarea:focus { border-color: #00FFC8; box-shadow: 0 0 6px rgba(0,255,200,0.15); }

/* ── CHECK GROUPS ── */
.check-group {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  align-items: center;
  margin-top: 0;
  width: 100%;
}
.check-item {
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  user-select: none;
  min-height: 24px;
  padding: 1px 5px 1px 3px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  border: 0.5px solid rgba(211,94,19,0.25);
  background: rgba(211,94,19,0.02);
  transition: all 0.15s;
  clip-path: polygon(3px 0%, 100% 0%, calc(100% - 3px) 100%, 0% 100%);
  font-size: 0.58rem;
}
body.dark-mode .check-item { background: rgba(26,40,71,0.3); border-color: rgba(0,255,200,0.1); }
.check-item:hover { border-color: rgba(211,94,19,0.4); background: rgba(211,94,19,0.05); }
body.dark-mode .check-item:hover { background: rgba(36,52,88,0.4); border-color: rgba(0,255,200,0.2); box-shadow: 0 0 4px rgba(0,255,200,0.08); }
.check-item:has(input:checked) { background: transparent; border-color: #D35E13; outline: 1.5px solid #D35E13; box-shadow: 0 0 4px rgba(211,94,19,0.3); }
body.dark-mode .check-item:has(input:checked) { background: transparent; border-color: #00FFC8; outline: 1.5px solid #00FFC8; box-shadow: 0 0 6px rgba(0,255,200,0.3); }

.check-item input[type="checkbox"],
.check-item input[type="radio"] {
  width: 11px !important; height: 11px !important;
  min-height: 11px !important; min-width: 11px !important;
  accent-color: #D35E13;
  cursor: pointer;
  flex-shrink: 0;
  border: none; border-bottom: none;
  padding: 0;
  background: none;
  transition: all 0.3s ease;
}
body.dark-mode .check-item input[type="checkbox"],
body.dark-mode .check-item input[type="radio"] { accent-color: #00FFC8; }

.check-item span {
  font-family: var(--font-display);
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.6px;
  color: var(--text);
  text-transform: uppercase;
  transition: color 0.15s;
}
body.dark-mode .check-item span { color: #E0F7FF; }
.check-item:has(input:checked) span { color: #D35E13; font-weight: bold; text-shadow: none; }
body.dark-mode .check-item:has(input:checked) span { color: #D35E13; font-weight: bold; text-shadow: none; }

/* ── TEST GRID ── */
.test-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 8px;
  width: 100%;
}
.test-item { display: flex; align-items: center; gap: 8px; }
.test-item label { min-width: 75px; white-space: nowrap; }
/* Keep the Y/N group its natural (compact) width here so it matches the
   yn-groups used elsewhere, instead of spreading across the grid cell. */
.test-item .yn-group { flex: 0 0 auto; width: auto; margin-right: auto; }
/* Force the Y/N buttons here to the same compact size as other sections */
.test-item .yn-group .yn-label { padding: 0 8px !important; min-width: 0 !important; width: auto !important; flex: 0 0 auto !important; }
@media (max-width: 768px) { .test-grid { grid-template-columns: 1fr; gap: 10px; } html.ipad #sim-body-full .test-grid { grid-template-columns: 1fr 1fr !important; } }

/* Mobile screen only: match check-item chip height to yn-group (26px) */
@media screen and (max-width: 768px) {
  .check-item {
    height: 26px;
    min-height: 26px;
  }
}

/* ── Y/N TOGGLE ── */
.yn-group {
  display: inline-flex;
  border: 0.5px solid rgba(211,94,19,0.25);
  overflow: visible;
  flex-shrink: 0;
  background: var(--panel);
  transition: all 0.3s ease;
  height: 26px;
  position: relative;
}
body.dark-mode .yn-group { background: rgba(15,21,53,0.7); border-color: rgba(0,255,200,0.1); }
.yn-group input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
.yn-group .yn-label {
  padding: 0 8px;
  font-family: var(--font-display);
  font-size: 0.63rem;
  font-weight: 600;
  letter-spacing: 1.2px;
  cursor: pointer;
  color: var(--text-muted);
  background: transparent;
  border: none;
  min-height: 26px;
  display: flex;
  align-items: center;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.15s;
}
body.dark-mode .yn-group .yn-label { color: #7DD3FC; }
.yn-group .yn-label:first-of-type { border-right: 0.5px solid rgba(211,94,19,0.15); }
body.dark-mode .yn-group .yn-label:first-of-type { border-right-color: rgba(0,255,200,0.08); }
.yn-group .yn-label:hover { background: rgba(211,94,19,0.05); color: var(--text); }
body.dark-mode .yn-group .yn-label:hover { background: rgba(0,255,200,0.04); color: #E0F7FF; }
.yn-group .yn-y:checked + .yn-label-y { background: #059669; color: #fff; text-shadow: none; box-shadow: inset 0 0 6px rgba(0,0,0,0.15); }
.yn-group .yn-n:checked + .yn-label-n { background: #DC2626; color: #fff; text-shadow: none; box-shadow: inset 0 0 6px rgba(0,0,0,0.15); }
body.dark-mode .yn-group .yn-y:checked + .yn-label-y { background: #059669; color: #fff; text-shadow: none; box-shadow: 0 0 8px rgba(5,150,105,0.4); }
body.dark-mode .yn-group .yn-n:checked + .yn-label-n { background: #DC2626; color: #fff; text-shadow: none; box-shadow: 0 0 8px rgba(220,38,38,0.4); }

/* ── FOOTER ── */
.footer {
  background: var(--panel);
  padding: 12px 10px 4px 10px;
  padding-bottom: max(4px, env(safe-area-inset-bottom, 4px));
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  border-top: 1px solid var(--border-bright);
  margin-top: 0;
  flex-shrink: 0;
  transition: all 0.3s ease;
  width: 100%;
  box-sizing: border-box;
  min-height: auto;
}
body.dark-mode .footer {
  background: linear-gradient(90deg,rgba(15,21,53,0.8) 0%,rgba(26,40,71,0.6) 100%);
  border-top-color: rgba(0,255,200,0.15);
  box-shadow: 0 -2px 6px rgba(0,0,0,0.3);
}
.footer-text {
  font-family: var(--font-display);
  font-size: 0.48rem;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  transition: color 0.3s ease;
}
body.dark-mode .footer-text { color: #7DD3FC; text-shadow: 0 0 4px rgba(0,255,200,0.15); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(211,94,19,0.3); border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }
body.dark-mode::-webkit-scrollbar { width: 6px; }
body.dark-mode::-webkit-scrollbar-track { background: rgba(10,14,39,0.5); border-radius: 3px; }
body.dark-mode::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#00FFC8 0%,#3B82F6 100%); border-radius: 3px; box-shadow: 0 0 6px rgba(0,255,200,0.3); }
body.dark-mode::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg,#00FFE8 0%,#60A5FA 100%); box-shadow: 0 0 10px rgba(0,255,200,0.5); }

/* ══════════════════════════════════════════════════════════════
   PRINT STYLES
   ══════════════════════════════════════════════════════════════ */
@media print {
  @page { size: 8.7in 11in; margin: 0.15in 0.15in 0.06in 0.15in !important; }

  .leak-loc .check-group { flex-wrap: nowrap !important; white-space: nowrap !important; gap: 4px !important; }

  /* Tighten the two TS Serial rows a hair in print */
  .ts-row { margin-bottom: 2px !important; gap: 6px !important; }
  .ts-row label { margin: 0 !important; }
  .ts-row .check-group { gap: 1px !important; }

  html {
    height: auto !important; margin: 0 !important; padding: 0 !important;
    overflow: visible !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  body {
    height: auto !important; min-height: 0 !important;
    margin: 0 !important; padding: 0 !important;
    overflow: visible !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  *, *::before, *::after { animation: none !important; transition: none !important; color-scheme: light !important; }

  /* ── CRITICAL: force LIGHT mode in print regardless of dark-mode class ──
     The JS stamp() pass can miss some of the many dark-mode rules, leaving
     dark styling in the PDF. This blanket block guarantees a light printout. */
  body.dark-mode, html.dark-mode-pending body {
    background: #ffffff !important; color: #1F2937 !important;
    color-scheme: light !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
  }
  /* The dark theme paints a fixed full-viewport gradient via body.dark-mode::before.
     A pseudo-element is NOT matched by the `body.dark-mode *` rule below, so without
     this it survives into print and bleeds a dark background behind the page
     (most visible on iPad). Neutralize it explicitly. */
  body.dark-mode::before, body.dark-mode::after,
  html.dark-mode-pending body::before, html.dark-mode-pending body::after {
    display: none !important; background: #ffffff !important; content: none !important;
  }
  body.dark-mode *, html.dark-mode-pending body * {
    background: #ffffff !important; background-color: #ffffff !important;
    color: #1F2937 !important; -webkit-text-fill-color: #1F2937 !important;
    border-color: rgba(211,94,19,0.4) !important; box-shadow: none !important; text-shadow: none !important;
  }
  /* Preserve the amber/orange accents (match light mode) — the blanket rule
     above otherwise flattens them to dark gray. */
  body.dark-mode .section-header, html.dark-mode-pending .section-header,
  body.dark-mode .section-header *, html.dark-mode-pending .section-header *,
  body.dark-mode .company-name, html.dark-mode-pending .company-name,
  body.dark-mode .doc-title, html.dark-mode-pending .doc-title,
  body.dark-mode .bullet, html.dark-mode-pending .bullet {
    color: #D35E13 !important; -webkit-text-fill-color: #D35E13 !important;
  }
  body.dark-mode .page, html.dark-mode-pending .page { border-color: #D35E13 !important; }
  /* Kill dark header gradient, the glowing ::after line, and the logo's dark
     glow filter so no dark color bleeds behind the logo/header in print. */
  body.dark-mode .header, html.dark-mode-pending .header {
    background: #ffffff !important; background-image: none !important; box-shadow: none !important;
  }
  body.dark-mode .header::after, html.dark-mode-pending .header::after {
    background: none !important; background-image: none !important; opacity: 0 !important; display: none !important;
  }
  body.dark-mode .logo-img, html.dark-mode-pending .logo-img {
    filter: none !important; animation: none !important; box-shadow: none !important; background: transparent !important;
  }
  body.dark-mode .section-header::before, html.dark-mode-pending .section-header::before { background: #D35E13 !important; }
  /* Field underlines / borders keep the amber tint instead of going gray */
  body.dark-mode input, body.dark-mode textarea, body.dark-mode select,
  html.dark-mode-pending input, html.dark-mode-pending textarea, html.dark-mode-pending select {
    border-color: rgba(211,94,19,0.4) !important;
  }
  body.dark-mode .page, html.dark-mode-pending .page { background: #ffffff !important; border: 1.5pt solid #D35E13 !important; }
  body.dark-mode .section-header, html.dark-mode-pending .section-header { background: #f5f5f5 !important; color: #D35E13 !important; }
  body.dark-mode .section-header::before, html.dark-mode-pending .section-header::before { background: #D35E13 !important; }
  body.dark-mode .company-name, html.dark-mode-pending .company-name { color: #D35E13 !important; }
  body.dark-mode table th, html.dark-mode-pending table th { background: #4B5563 !important; color: #ffffff !important; -webkit-text-fill-color: #ffffff !important; }
  body.dark-mode table td.row-label, html.dark-mode-pending table td.row-label { background: #f0f0f0 !important; }
  body.dark-mode .action-bar, body.dark-mode .theme-toggle-btn,
  html.dark-mode-pending .action-bar, html.dark-mode-pending .theme-toggle-btn { display: none !important; }

  /* iOS */
  html.ios * { transform: none !important; -webkit-text-size-adjust: 100% !important; text-size-adjust: 100% !important; }
  html.ios .page, html.ios body, html.ios html { display: block !important; min-height: 0 !important; height: auto !important; max-height: none !important; overflow: visible !important; }

  /* ── macOS Safari tuning (zoom removed — native print decides scaling) ── */
  html.macos { font-size: 17.05px !important; }
  html.macos body { margin: 0 !important; width: auto !important; max-width: 100% !important; }
  html.macos .page {
    border: 1.5px solid #D35E13 !important;

  }
  html.macos .company-name  { font-size: calc(1.05rem - 0.95px) !important; }

  html.macos .logo-img      { width: 46px !important; height: 46px !important; filter: none !important; animation: none !important; }
  html.macos .header        { margin-bottom: 2px !important; padding: 0 10px 3px 10px !important; }
  html.macos .section-header { font-size: calc(0.576rem - 0.95px) !important; letter-spacing: 0.3px !important; }
  /* Match mobile: tight vertical spacing so everything + footer fits one page */
  html.macos .section       { margin-bottom: 1px !important; }

  html.macos .field-row     { font-size: calc(0.626rem - 0.95px) !important; gap: 3px !important; line-height: 1.35 !important; margin-bottom: 0.5px !important; }
  html.macos .section-body  { padding: 1.5px 6px !important; }
  html.macos .field-row label { font-size: calc(0.66rem - 0.95px) !important; }
  html.macos label          { font-size: calc(0.66rem - 0.95px) !important; }
  html.macos input[type="text"],
  html.macos input[type="date"],
  html.macos input[type="number"],
  html.macos textarea,
  html.macos select         { font-size: calc(0.626rem - 0.45px) !important; min-height: 16px !important; }
  html.macos #batnotes      { height: 40px !important; min-height: 40px !important; max-height: 40px !important; overflow: hidden !important; }
  html.macos #gennotes      { height: 60px !important; min-height: 60px !important; max-height: 60px !important; overflow: hidden !important; }
  html.macos #oilnotes,
  html.macos #gasnotes,
  html.macos #tsnotes       { height: 40px !important; min-height: 40px !important; max-height: 40px !important; overflow: hidden !important; }
  html.macos .check-item span, html.macos .opt span { font-size: calc(0.66rem - 0.95px) !important; }
  html.macos .check-item input[type="checkbox"],
  html.macos .check-item input[type="radio"] { width: 12px !important; height: 12px !important; min-width: 12px !important; min-height: 12px !important; }
  html.macos .yn-group      { height: 19px !important; }
  html.macos .yn-group .yn-label { min-height: 19px !important; font-size: calc(0.72rem - 1.95px) !important; padding: 0 7px !important; }
  html.macos #other-section label { font-size: calc(0.66rem - 1.45px) !important; }
  html.macos .footer        { margin-top: 0 !important; padding: 2px 26px 1px 26px !important; }
  html.macos .footer-text,
  html.macos .footer span   { font-size: calc(0.48rem - 0.95px) !important; }


  /* Windows */
  html.windows { font-size: 18.3px !important; }
  html.windows .page { break-inside: auto !important; page-break-inside: auto !important; }
  html.windows * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* Android */
  html.android * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  html.android .page { display: block !important; min-height: 0 !important; height: auto !important; }

  input::placeholder, textarea::placeholder { color: transparent !important; opacity: 0 !important; }
  input::-webkit-input-placeholder, textarea::-webkit-input-placeholder { color: transparent !important; opacity: 0 !important; }

  .page {
    display: block !important; width: 100% !important; max-width: 100% !important;
    height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important;
    flex-direction: unset !important; flex-shrink: unset !important; flex: none !important;
    box-sizing: border-box !important;
    margin: 0 !important; padding: 4px 3px 0.5px 3px !important;

  .footer { display: block !important; flex: none !important; margin-top: 0 !important; margin-bottom: 0 !important; }
  html, body { display: block !important; height: auto !important; min-height: 0 !important; max-height: none !important; overflow: visible !important; }

  .page::before, .page::after, .page-corner-bl, .page-corner-br { display: block !important; border-color: #D35E13 !important; }

  .header::after { display: none !important; }

  /* Hide the date field's calendar picker icon in print */

/* ── iPhone Safari landscape 2-page fix ──
   In landscape the print layout width crosses 768px, so the unscoped
   `@media print and (min-width:768px)` block above fires and wipes out the
   stamped 820px portrait column (width:auto/100%), reflowing the form wide and
   spilling onto a 2nd page. Portrait never triggers that block, which is why it
   stays one page. Re-assert the 820px portrait column for mobile-safari so a
   landscape print lays out identically to portrait. Class specificity (0,1,1)
   beats the element-level (0,0,1) rule even though both use !important, and
   this block is placed AFTER it for good measure. */

  html.mobile-safari { font-size: 18.5px !important; width: 820px !important; max-width: 820px !important; }
  body.mobile-safari { width: 820px !important; max-width: 820px !important; margin: 0 auto !important; }
  html.mobile-safari .page { width: 100% !important; max-width: 820px !important; margin: 0 auto !important; box-sizing: border-box !important; }

<script>
(function () {
  var ua = navigator.userAgent;
  var html = document.documentElement;
  var isCriOS    = /CriOS/.test(ua);                                          // Chrome on iPhone/iPad (WebKit under the hood)
  var isIOS      = /iP(hone|od|ad)/.test(ua) && /WebKit/.test(ua);            // any iOS WebKit incl. CriOS
  var isMacOS    = /Macintosh/.test(ua) && /Safari/.test(ua) && !/Chrome/.test(ua);
  var isWindows  = /Windows/.test(ua);
  var isAndroid  = /Android/.test(ua);
  // Chrome-on-iPhone is WebKit, so it must follow the Safari path (CSS width,
  // NO viewport override). Only ANDROID Chrome gets the viewport-override path.
  var isAndroidChrome = isAndroid && /Chrome/.test(ua) && !/Edg/.test(ua);
  var isMobileChrome = isAndroidChrome;

  // ── iPad detection ──────────────────────────────────────────────────────
  // Modern iPadOS Safari lies and reports a desktop "Macintosh" UA, so it would
  // otherwise be mis-tagged as macOS and inherit the desktop-Mac print rules.
  // We catch it three ways: (1) classic "iPad" UA, (2) the MacIntel + touch
  // tell of iPadOS in desktop mode, (3) any Macintosh UA that also reports
  // touch points (real Macs report 0).
  var mtp = navigator.maxTouchPoints || 0;
  var isIPad = /iPad/.test(ua)
    || (navigator.platform === 'MacIntel' && mtp > 1)
    || (/Macintosh/.test(ua) && mtp > 1);

  if (isIOS)          html.classList.add('ios', 'mobile-safari');
  if (isMacOS)        html.classList.add('macos');
  if (isWindows)      html.classList.add('windows');
  if (isAndroid)      html.classList.add('android');
  if (isMobileChrome) html.classList.add('mobile-chrome');
  if (isIPad) {
    html.classList.add('ipad');
    html.classList.remove('macos');   // iPad is NOT a desktop Mac for print
    // A classic-UA iPad also matched isIOS above and got 'mobile-safari'/'ios',
    // which made it inherit the iPHONE layout, scroll, and print rules — the
    // cause of the iPad "displaying what the iPhone sees" + sticking. Strip
    // them so the iPad is treated purely as an iPad.
    html.classList.remove('mobile-safari', 'ios');
  }

  function applyToBody() {
    if (isIOS)          document.body.classList.add('ios', 'mobile-safari');
    if (isMacOS)        document.body.classList.add('macos');
    if (isWindows)      document.body.classList.add('windows');
    if (isAndroid)      document.body.classList.add('android');
    if (isMobileChrome) document.body.classList.add('mobile-chrome');
    if (isIPad) {
      document.body.classList.add('ipad');
      document.body.classList.remove('macos');
      document.body.classList.remove('mobile-safari', 'ios');
    }
  }
  if (document.body) applyToBody();
  else document.addEventListener('DOMContentLoaded', applyToBody);
})();
</script>

<script>
const THEME_KEY = 'aog_maint_theme';
const DRAFT_KEY = 'aog_maint_draft';

function getInitialTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) return saved;
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
  return 'light';
}

function applyTheme(theme) {
  if (theme === 'dark') document.body.classList.add('dark-mode');
  else document.body.classList.remove('dark-mode');
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
}

function toggleTheme() {
  applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');
}

function setupThemeToggle() {
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.addEventListener('click', toggleTheme);
}

function saveDraft() {
  const data = {};
  document.querySelectorAll('input, textarea').forEach(el => {
    const key = el.id || el.name;
    if (!key) return;
    if (el.type === 'checkbox') {
      if (!data[key]) data[key] = [];
      if (el.checked) data[key].push(el.value);
    } else if (el.type === 'radio') {
      if (el.checked) data[key] = el.value;
    } else {
      if (data[key] === undefined) data[key] = el.value;
    }
  });
  try { localStorage.setItem(DRAFT_KEY, JSON.stringify(data)); } catch (e) {}
}

function restoreDraft() {
  const saved = localStorage.getItem(DRAFT_KEY);
  if (!saved) return;
  try {
    const data = JSON.parse(saved);
    document.querySelectorAll('input, textarea').forEach(el => {
      const key = el.id || el.name;
      if (!key || data[key] === undefined) return;
      if (el.type === 'checkbox') {
        if (Array.isArray(data[key])) el.checked = data[key].includes(el.value);
      } else if (el.type === 'radio') {
        if (el.value === data[key]) el.checked = true;
      } else {
        el.value = data[key];
      }
    });
  } catch (e) {}
}

function clearForm() {
  if (!confirm('Clear all fields?')) return;
  document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"], textarea').forEach(el => el.value = '');
  document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(el => el.checked = false);
  localStorage.removeItem(DRAFT_KEY);
}

function openPrintPreview() {
  var isMobileSafari = document.body.classList.contains('mobile-safari');
  var isMobileChrome = document.body.classList.contains('mobile-chrome');
  var isIPad         = document.body.classList.contains('ipad');
  var isNarrowMobile = isMobileSafari || isMobileChrome;
  // Real phone flag captured BEFORE the iPad blocks below reassign
  // isMobileSafari/isNarrowMobile to true. Used for the landscape→portrait
  // viewport override so it only targets actual phones.
  var isPhone        = isMobileSafari || isMobileChrome;
  var wasDark        = document.body.classList.contains('dark-mode');

  // ── Set document title for PDF filename (name + address + report) ──
  var prevTitle = document.title;
  var _nm = (document.getElementById('name')    && document.getElementById('name').value    || '').trim();
  var _ad = (document.getElementById('address') && document.getElementById('address').value || '').trim();
  var cName = [_nm, _ad].filter(Boolean).join(' ');
  document.title = (cName ? cName + ' - ' : '') + 'Maintenance Report';

  // ── Strip dark mode ──
  document.body.classList.remove('dark-mode');
  document.documentElement.classList.remove('dark-mode-pending');
  document.documentElement.style.colorScheme = 'light';
  document.body.style.colorScheme = 'light';

  var vp = document.querySelector('meta[name="viewport"]');
  var origVP = vp ? vp.getAttribute('content') : null;

  // ── iPad: force narrow viewport + route through the phone print path ──
  // Only active during this PDF flow; origVP above captures the real value
  // so restore() will undo it automatically when the print dialog closes.
  var isIPadNav = navigator.maxTouchPoints > 2 && /Macintosh/.test(navigator.userAgent);
  if ((isIPad || isIPadNav) && vp) {
    vp.setAttribute('content', 'width=835, initial-scale=1, viewport-fit=cover');
    isNarrowMobile = true;  // use the full phone inline-stamp path
    isMobileSafari = true;  // use the WebKit 350 ms settle delay
  }

  // ── iPad Chrome (CriOS): explicit handling — CriOS UA on iPadOS ──
  // Not caught by isMobileChrome (Android-only) or always by the Macintosh
  // UA check above. Detect it directly and apply the same 835px viewport.
  var isIPadChrome = /CriOS/.test(navigator.userAgent);
  if (isIPadChrome && vp && !isNarrowMobile) {
    vp.setAttribute('content', 'width=835, initial-scale=1, viewport-fit=cover');
    isNarrowMobile = true;
    isMobileSafari = true;
  }

  // ── Phone in landscape: force a portrait-width viewport before printing ──
  // With width=device-width, a phone held in landscape gives a wide layout
  // viewport, so the stamped 820px sheet renders scaled into a landscape page.
  // Pin the viewport to the device's PORTRAIT (narrow) CSS width so the page
  // lays out exactly as it would in portrait, regardless of physical rotation.
  // origVP (captured above) restores the real value when the dialog closes.
  // (Image capture path is separate and intentionally left untouched.)
  var _isLandscape = (window.matchMedia && window.matchMedia('(orientation: landscape)').matches)
                     || (window.innerWidth > window.innerHeight);
  if (isPhone && _isLandscape && vp) {
    // Math.min() = the narrow (portrait) dimension regardless of whether the
    // browser rotates screen.width/height with orientation.
    var _portraitW = Math.min(screen.width || 0, screen.height || 0) || 390;
    vp.setAttribute('content', 'width=' + _portraitW + ', initial-scale=1, maximum-scale=1, viewport-fit=cover');
  }

  // ── Snapshot store — every element we touch gets its original style saved ──
  var _snapshots = [];
  function _snap(el, prop, val) {
    _snapshots.push({ el: el, prop: prop, was: el.style[prop] });
    el.style[prop] = val;
  }
  function _snapAttr(el, attr, val) {
    _snapshots.push({ el: el, attr: attr, was: el.getAttribute(attr) });
    el.setAttribute(attr, val);
  }

  // ── RESTORE function ──
  function restore() {
    document.title = prevTitle;
    if (vp && origVP != null) vp.setAttribute('content', origVP);
    var pl = document.getElementById('force-print-light'); if(pl) pl.remove();
    document.documentElement.style.colorScheme = '';
    document.body.style.colorScheme = '';
    // Restore all snapshotted styles/attrs in reverse order
    for (var i = _snapshots.length - 1; i >= 0; i--) {
      var s = _snapshots[i];
      if (s.attr) {
        if (s.was === null) s.el.removeAttribute(s.attr);
        else s.el.setAttribute(s.attr, s.was);
      } else {
        s.el.style[s.prop] = s.was;
      }
    }
    _snapshots = [];
    if (wasDark) {
      document.body.classList.add('dark-mode');
      document.documentElement.setAttribute('data-theme', 'dark');
      if (isMobileSafari || isIPad) {
        if (typeof saveDraft === 'function') saveDraft();
        window.location.reload();
        return;
      }
    } else {
      document.body.classList.remove('dark-mode');
      document.documentElement.setAttribute('data-theme', 'light');
    }
  }

  // ══════════════════════════════════════════════════════════════════
  // STAMP ALL MOBILE PRINT RULES AS INLINE STYLES — unconditionally.
  // This makes printer-detected vs. no-printer identical because the
  // layout is locked in the DOM before window.print() is ever called.
  // @media print CSS is kept as a fallback but is no longer the source
  // of truth for layout on mobile.
  // ══════════════════════════════════════════════════════════════════
  if (isNarrowMobile) {
    var html = document.documentElement;
    var body = document.body;
    var page = document.getElementById('page');

    // html / body sizing — locks the 820px print layout inline
    _snap(html, 'fontSize',  (isMobileSafari ? '18.5' : '18') + 'px');
    _snap(html, 'width',     '820px');
    _snap(body, 'width',     '820px');
    _snap(body, 'maxWidth',  '820px');
    _snap(body, 'minWidth',  '0');
    _snap(body, 'height',    'auto');
    _snap(body, 'minHeight', '0');
    _snap(body, 'margin',    '0');
    _snap(body, 'padding',   '0');

    // .page
    if (page) {
      _snap(page, 'display',   'block');
      _snap(page, 'width',     '100%');
      _snap(page, 'maxWidth',  '100%');
      _snap(page, 'padding',   '4px 3px 2px 3px');
      _snap(page, 'margin',    '0 auto');
      _snap(page, 'height',    'auto');
      _snap(page, 'minHeight', '0');
      _snap(page, 'maxHeight', 'none');
      _snap(page, 'position',  'static');
      _snap(page, 'overflow',  'visible');
      _snap(page, 'boxSizing', 'border-box');
      _snap(page, 'border',    '1.5px solid #D35E13');
      _snap(page, 'boxShadow', 'none');
      _snap(page, 'marginTop', '0');
    }

    // .header
    var header = document.querySelector('.header');
    if (header) {
      _snap(header, 'display',         'flex');
      _snap(header, 'marginBottom',    '4px');
      _snap(header, 'padding',         '0 10px 5px 10px');
      _snap(header, 'background',      'white');
      _snap(header, 'minHeight',       'auto');
      _snap(header, 'boxShadow',       'none');
    }

    // .content
    var content = document.querySelector('.content');
    if (content) {
      _snap(content, 'display',   'block');
      _snap(content, 'overflow',  'visible');
      _snap(content, 'padding',   '3px 0 0 0');
      _snap(content, 'margin',    '0');
    }

    // .section — spacing
    document.querySelectorAll('.section').forEach(function(el) {
      _snap(el, 'marginBottom', '0');
      _snap(el, 'background',  'white');
      _snap(el, 'boxShadow',   'none');
      _snap(el, 'display',     'block');
      _snap(el, 'border',      '0.5px solid #D35E13');
      _snap(el, 'padding',     '0');
    });

    // .section-body
    document.querySelectorAll('.section-body').forEach(function(el) {
      _snap(el, 'padding',    '1.5px 6px');
      _snap(el, 'background', 'white');
      _snap(el, 'display',    'block');
    });

    // .section-header
    document.querySelectorAll('.section-header').forEach(function(el) {
      _snap(el, 'background',   '#f5f5f5');
      _snap(el, 'color',        '#D35E13');
      _snap(el, 'borderBottom', '0.5px solid #D35E13');
      _snap(el, 'textShadow',   'none');
      _snap(el, 'padding',      '3px 7px');
      _snap(el, 'display',      'flex');
      _snap(el, 'minHeight',    'auto');
    });

    // .two-column
    document.querySelectorAll('.two-column').forEach(function(el) {
      _snap(el, 'display',       'grid');
      _snap(el, 'gridTemplateColumns', '1fr 1fr');
      _snap(el, 'gap',           '2px');
      _snap(el, 'marginBottom',  '0');
    });

    // .field-row
    document.querySelectorAll('.field-row').forEach(function(el) {
      _snap(el, 'display',       'flex');
      _snap(el, 'marginBottom',  (el.closest && el.closest('.vrows-print')) ? '3.75px' : '2.5px');
      _snap(el, 'gap',           '3px');
    });

    // textareas — match mobile-safari print heights
    var taNotes = {
      'batnotes': '34px', 'gennotes': '54px',
      'oilnotes': '34px', 'gasnotes': '34px', 'tsnotes': '34px', 'svcnotes': '34px'
    };
    Object.keys(taNotes).forEach(function(id) {
      var ta = document.getElementById(id);
      if (ta) {
        _snap(ta, 'height',    taNotes[id]);
        _snap(ta, 'minHeight', taNotes[id]);
        _snap(ta, 'maxHeight', taNotes[id]);
        _snap(ta, 'overflow',  'hidden');
      }
    });

    // inputs / textareas / selects — general
    document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"], textarea, select').forEach(function(el) {
      _snap(el, 'background',  'white');
      _snap(el, 'color',       '#1F2937');
      _snap(el, 'minHeight',   '16px');
      _snap(el, 'fontSize',    'calc(0.756rem + 0.3px)');
      _snap(el, 'boxShadow',   'none');
      _snap(el, 'borderTop',   'none');
      _snap(el, 'borderLeft',  'none');
      _snap(el, 'borderRight', 'none');
      _snap(el, 'borderBottom','0.5px solid #D35E13');
      _snap(el, 'padding',     '0 2px');
    });

    // Power test notes: applied AFTER the general loop so these win.
    // Give the box enough height to actually show its two lines — at the print
    // font size a 34px box can't fit two lines, so WebKit scrolls the first
    // line out of view (clipping the top). 46px fits both lines; top-anchored.
    (function() {
      var sp = document.getElementById('simperfnotes');
      if (sp) {
        _snap(sp, 'height',     '34px');
        _snap(sp, 'minHeight',  '34px');
        _snap(sp, 'maxHeight',  '34px');
        _snap(sp, 'overflow',   'hidden');
        _snap(sp, 'padding',    '2px 2px 0 2px');
        _snap(sp, 'lineHeight', '1.15');
        _snap(sp, 'boxSizing',  'border-box');
        _snap(sp, 'verticalAlign', 'top');
        // Belt-and-suspenders: also reset scroll to the top.
        try { sp.scrollTop = 0; } catch (e) {}
      }
    })();

    // .check-item controls sizing
    document.querySelectorAll('.check-item input[type="checkbox"], .check-item input[type="radio"]').forEach(function(el) {
      _snap(el, 'width',     '12px');
      _snap(el, 'height',    '12px');
      _snap(el, 'minWidth',  '12px');
      _snap(el, 'minHeight', '12px');
      if (el.checked) _snap(el, 'accentColor', '#D35E13');
    });
    document.querySelectorAll('.check-item span, .opt span').forEach(function(el) {
      _snap(el, 'fontSize', 'calc(0.66rem + 0.3px)');
      // If this span's check-item is selected, stamp the amber/bold emphasis
      // inline so it survives the reflow (matches the @media print :checked rule).
      var ci = el.closest && el.closest('.check-item');
      if (ci && ci.querySelector('input:checked')) {
        _snap(el, 'color', '#D35E13');
        _snap(el, 'webkitTextFillColor', '#D35E13');
        _snap(el, 'fontWeight', 'bold');
      }
    });
    // Stamp the selected outline on checked check-items themselves.
    document.querySelectorAll('.check-item').forEach(function(el) {
      if (el.querySelector('input:checked')) {
        _snap(el, 'outline',     '1.5px solid #D35E13');
        _snap(el, 'borderColor',  '#D35E13');
        _snap(el, 'background',    'transparent');
      }
    });

    // .yn-group sizing — must match the per-device @media print CSS
    // (mobile-safari / mobile-chrome both 19px). Inline stamps win over the
    // stylesheet, so these values are the real source of truth on phones.
    document.querySelectorAll('.yn-group').forEach(function(el) {
      _snap(el, 'height',     '19px');
      _snap(el, 'minHeight',  '19px');
      _snap(el, 'maxHeight',  '19px');
      _snap(el, 'background', 'white');
      _snap(el, 'border',     '0.5px solid #D35E13');
      _snap(el, 'display',    'inline-flex');
      _snap(el, 'alignItems', 'center');
      _snap(el, 'boxSizing',  'border-box');
    });
    document.querySelectorAll('.yn-group .yn-label').forEach(function(el) {
      _snap(el, 'height',    '17px');
      _snap(el, 'minHeight', '0');
      _snap(el, 'maxHeight', '17px');
      _snap(el, 'lineHeight','1');
      _snap(el, 'fontSize',  'calc(0.72rem - 0.7px)');
      _snap(el, 'padding',   '0 7px');
      _snap(el, 'display',   'flex');
      _snap(el, 'alignItems','center');
      // The radio that controls this label sits immediately before it.
      // Stamp the SELECTED colors inline so the green/red fill survives the
      // reflow — otherwise the flat white/gray below would override the
      // @media print :checked rule (inline always wins).
      var radio = el.previousElementSibling;
      var on = radio && radio.tagName === 'INPUT' && radio.checked;
      if (on && el.classList.contains('yn-label-y')) {
        _snap(el, 'background', '#059669');
        _snap(el, 'color', '#fff');
        _snap(el, 'webkitTextFillColor', '#fff');
      } else if (on && el.classList.contains('yn-label-n')) {

        _snap(el, 'color',      '#6B7280');

        _snap(cg, 'gap',      '2px');

    });

    // name-job-date row
    var njd = document.getElementById('name-job-date-row');
    if (njd) {
      _snap(njd, 'flexWrap', 'nowrap');
      var nameEl = document.getElementById('name');
      var numEl  = document.getElementById('number');
      var dateEl = document.getElementById('date');
      if (nameEl) { _snap(nameEl, 'flex', '1 1 0'); _snap(nameEl, 'width', 'auto'); _snap(nameEl, 'minWidth', '0'); }
      if (numEl)  { _snap(numEl,  'flex', '1 1 0'); _snap(numEl,  'width', 'auto'); _snap(numEl,  'minWidth', '0'); }
      if (dateEl) { _snap(dateEl, 'flex', '0 0 100px'); _snap(dateEl, 'width', '100px'); _snap(dateEl, 'minWidth', '100px'); }
    }

    // action-bar / save-status hidden
    var ab = document.getElementById('action-bar');
    var ss = document.getElementById('save-status');
    if (ab) _snap(ab, 'display', 'none');
    if (ss) _snap(ss, 'display', 'none');

    // ── Android Chrome: apply the SAME tightened padding/spacing as iPad ──
    // The shared narrow-mobile stamps above use the iPhone's looser vertical
    // spacing, which tips the footer onto a 2nd page on Android Chrome. Re-stamp
    // (mobile-chrome only) with iPad's values so the form fits one page. These
    // run after the shared stamps so they win; iPhone (mobile-safari) is left
    // untouched. Re-stamping the same prop is safe — restore() walks the
    // snapshot stack in reverse and still lands back on the original value.
    if (isMobileChrome) {
      var _pageMC = document.getElementById('page');

      // into a slightly narrower printable area, so 8px sides clipped the
      // right-hand pills (e.g. gas LOCATION "RIGHT"). Pull the sides in to ~2px
      // to recover that width and let the no-wrap rows sit fully on the page.
      if (_pageMC) _snap(_pageMC, 'padding', '4px 2px 0 2px');

      var _gasMC = document.getElementById('gas-top-row');
      var _oilMC = document.getElementById('oil-top-row');
      if (_gasMC) _snap(_gasMC, 'gap', '10px');
      if (_oilMC) _snap(_oilMC, 'gap', '10px');

      document.querySelectorAll('.section').forEach(function(el) {
        _snap(el, 'marginBottom', '0');
      });
      document.querySelectorAll('.section-header').forEach(function(el) {
        _snap(el, 'padding', '2px 7px');
      });
      document.querySelectorAll('.section-body').forEach(function(el) {
        _snap(el, 'padding', '1px 6px');
      });
      document.querySelectorAll('.two-column').forEach(function(el) {
        _snap(el, 'marginBottom', '1px');
        _snap(el, 'gap', '2px');
      });
      document.querySelectorAll('.field-row').forEach(function(el) {
        _snap(el, 'marginBottom', '0.5px');
      });
      var _footMC = document.querySelector('.footer');
      if (_footMC) {
        _snap(_footMC, 'marginTop',    '4px');
        _snap(_footMC, 'marginBottom', '0');
        _snap(_footMC, 'paddingBottom','1px');
      }
    }

    // Force layout reflow before print
    void document.getElementById('page').getBoundingClientRect();

    // Mobile Chrome: also override viewport so it lays out at 820px for real
    if (isMobileChrome && vp) {
      vp.setAttribute('content', 'width=835, initial-scale=1');
    }
  } else {
    // Desktop / iPad — stamp accent colors as before
    var compName = document.querySelector('.company-name');
    var docTitle = document.querySelector('.doc-title');
    if (compName) _snapAttr(compName, 'style', 'color:#D35E13!important;text-shadow:none!important;');
    if (docTitle)  _snapAttr(docTitle,  'style', 'color:#D35E13!important;text-shadow:none!important;');
    document.querySelectorAll('.footer-text, .footer span').forEach(function(el) {
      _snapAttr(el, 'style', 'color:#9CA3AF!important;text-shadow:none!important;');
    });

    // iPad: the dark theme's fixed full-viewport gradient (body.dark-mode::before)
    // is painted by a pseudo-element the @media print `*` rules can't reach, so it
    // bleeds a dark background behind the page and the late layout switch shows as
    // a reflow. Stamp the body white inline and force a reflow so the print layout
    // is locked before the dialog opens.
    if (isIPad) {
      _snap(document.body, 'background', '#ffffff');
      _snap(document.documentElement, 'background', '#ffffff');
      var _pg = document.getElementById('page');
      if (_pg) void _pg.getBoundingClientRect();
    }
  }

  // ── Inject force-print-light (dark mode only, colors only — layout already stamped) ──
  if (wasDark) {
    var printStyle = document.createElement('style');
    printStyle.id  = 'force-print-light';
    printStyle.textContent = [
      ':root, html, body { color-scheme: light !important; }',
      'body { --cyan:#D35E13!important; --bg:#FFFFFF!important; --panel:#FFFFFF!important; --text:#1F2937!important; --text-muted:#6B7280!important; --text-dim:#9CA3AF!important; }',
      ':root { --cyan:#D35E13!important; }',
      '*, *::before, *::after { animation:none!important; transition:none!important; }',
      '@media print {',
      '  *, *::before, *::after { background:white!important;color:#1F2937!important;box-shadow:none!important;text-shadow:none!important;animation:none!important;transition:none!important; }',
      '  .section-header, .section-header * { color:#D35E13!important; background:#f5f5f5!important; }',
      '  .section-header::before { background:#D35E13!important; }',
      '  html,body { background:white!important; }',
      '  body.dark-mode::before, body.dark-mode::after { display:none!important; content:none!important; background:white!important; }',
      '  .page { border:1.5pt solid #D35E13!important;background:white!important; }',
      '  .company-name { color:#D35E13!important; }',
      '  .doc-title { color:#D35E13!important; }',
      '  input, textarea, select { background:white!important;color:#1F2937!important; }',
      '  .footer-text, .footer span { color:#9CA3AF!important; }',
      '  .action-bar, #save-status { display:none!important; }',
      '}'

    document.head.appendChild(printStyle);
  }

  // Blur focused field — prevents iOS Safari print sheet from immediately closing
  if (document.activeElement && document.activeElement.blur) {
    document.activeElement.blur();
  }

  if (isNarrowMobile || isIPad) {
    // Fire the print after layout settles. iPhone/Android stamp an 820px layout
    // and need a short settle; iPad locks its own layout via double-rAF.
    if (isNarrowMobile) {
      // Double-rAF + timeout: lets the stamped styles reflow fully at 820px
      // before the print dialog captures the layout.
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          setTimeout(function() {
            window.print();
          }, isMobileSafari ? 350 : 0);
        });
      });
    } else {
      // iPad: let the inline white-stamp + dark-class removal paint before the
      // print dialog samples the layout, otherwise it captures mid-reflow.
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { window.print(); });
      });
    }

    // Devices that should hold the light/print layout until the user dismisses
    // the print sheet AND touches the screen (prevents dark mode flashing back
    // under the still-open preview AND prevents any un-stamp reflow / rescale of
    // the locked layout while the preview is live). iPhone Safari and iPad both
    // qualify, in BOTH light and dark mode — the layout stays frozen until a real
    // tap or the 60s fallback, so the preview can never reflow underneath it.
    var _deferRestore = (isMobileSafari || isIPad);

    // ── Restore strategy ──
    var _restored = false;
    var _printMql = window.matchMedia ? window.matchMedia('print') : null;

    function _tryRestore(delay) {
      if (_restored) return;
      _restored = true;
      clearTimeout(_safety);
      window.removeEventListener('afterprint', _apHandler);
      if (_printMql) {
        if (_printMql.removeEventListener) _printMql.removeEventListener('change', _mqlHandler);
        else if (_printMql.removeListener) _printMql.removeListener(_mqlHandler);
      }
      setTimeout(restore, delay || 0);
    }

    function _armDeferredRestore() {
      if (_deferRestore) {
        clearTimeout(_safety);
        function _onInteract() {
          window.removeEventListener('pointerdown', _onInteract, true);
          window.removeEventListener('touchstart',  _onInteract, true);
          window.removeEventListener('click',       _onInteract, true);
          _tryRestore(0);
        }
        window.addEventListener('pointerdown', _onInteract, true);
        window.addEventListener('touchstart',  _onInteract, true);
        window.addEventListener('click',       _onInteract, true);
        // Fallback so the form can never get stuck in the print/light state if
        // no touch ever arrives. Touch still restores instantly if it comes
        // first; otherwise this 60s timer restores for both iPhone and iPad.
        _safety = setTimeout(function() { _tryRestore(0); }, 60000);
      } else {
        _tryRestore(300);
      }
    }

    var _sawPrint = false;
    function _mqlHandler(mql) {
      if (mql.matches) { _sawPrint = true; }
      else if (_sawPrint) { _armDeferredRestore(); }
    }
    if (_printMql) {
      if (_printMql.addEventListener) _printMql.addEventListener('change', _mqlHandler);
      else if (_printMql.addListener) _printMql.addListener(_mqlHandler);
    }

    function _apHandler() { if (!_sawPrint) _tryRestore(0); }
    window.addEventListener('afterprint', _apHandler);

    // Safety net before the print dialog is ever seen. Devices that defer the
    // restore start with no pre-print timer (the deferred path arms its own).
    var _safety = _deferRestore
      ? null
      : setTimeout(function() { _tryRestore(0); }, 60000);

  } else {
    // Desktop print
    window.addEventListener('afterprint', restore);
    window.print();
  }
}

  const el = document.getElementById('save-status');

}

function capturePageToCanvas() {
  return new Promise((resolve, reject) => {
    const page        = document.getElementById('page');

    // natively ("Jun 21, 2026"). Parsed manually (not via new Date) so the
    // day never shifts due to UTC/timezone. Used by html2canvas onclone below,
    // because html2canvas paints date-input segments year-first on Safari.
    function _fmtCaptureDate(v) {
      var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(v || '');
      if (!m) return v || '';
      var mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var mi = parseInt(m[2], 10) - 1, d = parseInt(m[3], 10), y = m[1];

    // bit wider so the layout has room, and bumps the root font (below, in the
    // force-style) so the content isn't too small in the mobile image.

                       document.body.classList.contains('mobile-chrome');

    const CAPTURE_PAGE_H = Math.round(CAPTURE_WIDTH * PAPER_RATIO); // full sheet height at this width

      const prevWidth     = page.style.width;
      const prevMaxWidth  = page.style.maxWidth;
      const prevHeight    = page.style.height;

      const prevMarginTop = page.style.marginTop;

      // fire during html2canvas cloning and collapse the form to single-column.

      page.style.maxWidth  = CAPTURE_WIDTH + 'px';

      page.style.paddingTop = '0';

        '.two-column { display: grid !important; grid-template-columns: 1fr 1fr !important; }',

        // Mobile renders the form smaller; bump the root font so the content
